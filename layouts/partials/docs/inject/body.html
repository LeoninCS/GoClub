<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
.goclub-chatbot {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  font-family: var(--goclub-font-body, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);

.goclub-chatbot-toggle {
  width: 56px;

  color: white;

  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0, 51, 49, 0.18);

  align-items: center;
  justify-content: center;

}

  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0, 51, 49, 0.26);
}

  position: absolute;
  bottom: 76px;
  right: 0;
  width: 420px;
  height: 520px;
  background: #ffffff;
  border: 1px solid rgba(112, 121, 120, 0.16);
  border-radius: 1rem;
  box-shadow: 0 10px 20px rgba(36, 48, 46, 0.1), 0 3px 6px rgba(36, 48, 46, 0.05);
  display: none;

  min-width: 320px;
  min-height: 320px;
  max-width: 90vw;
  max-height: 80vh;
}
.goclub-chatbot-window.open { display: flex; }
.goclub-chatbot-header {
  padding: 16px 20px;
  background: linear-gradient(135deg, #003331, #004b49);
  color: white;
  display: flex;
  justify-content: space-between;

}
.goclub-chatbot-header h3 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.25px; }
.goclub-chatbot-header button {
  background: none;

.goclub-chatbot-settings {

}
.goclub-chatbot-settings-toggle {
  background: none;
  border: none;
  color: #003331;
  cursor: pointer;
  font-size: 13px;

  display: flex;

}

  display: none;

.goclub-chatbot-settings-panel label {
  display: block;

}
.goclub-chatbot-settings-panel input {

.goclub-chatbot-presets {
  padding: 12px 20px;

  border-bottom: 1px solid rgba(112, 121, 120, 0.14);

}
.goclub-chatbot-preset {
  background: rgba(255, 255, 255, 0.92);
  color: #003331;
  border: 1px solid rgba(112, 121, 120, 0.18);

.goclub-chatbot-preset:hover {

.goclub-chatbot-messages {
  flex: 1;
  overflow-y: auto;

}
.goclub-chatbot-msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}
.goclub-chatbot-msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #003331, #004b49);
  color: #ffffff;
  border-bottom-right-radius: 4px;
  box-shadow: 0 4px 12px rgba(0, 51, 49, 0.15);
}
.goclub-chatbot-msg.assistant {
  align-self: flex-start;
  background: rgba(255, 255, 255, 0.92);
  color: #1b1c1a;
  border: 1px solid rgba(112, 121, 120, 0.16);
  border-bottom-left-radius: 4px;

.goclub-chatbot-msg.error {
  align-self: flex-start;
  background: rgba(255, 218, 210, 0.5);
  color: #a33d23;

}
.goclub-chatbot-msg code {
  background: rgba(0, 75, 73, 0.08);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
}
.goclub-chatbot-msg pre {
  background: rgba(244, 244, 240, 0.96);
  border: 1px solid rgba(112, 121, 120, 0.16);
  color: #1b1c1a;
  padding: 12px 14px;
  border-radius: 0.85rem;
  overflow-x: auto;
  margin: 10px 0;
  line-height: 1.5;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
}
.goclub-chatbot-msg pre code {
  background: none;
  padding: 0;
  color: inherit;
  font-size: 13px;
}
.goclub-chatbot-msg pre code {
  background: none;
  padding: 0;
  color: inherit;
  font-size: 13px;
}
.goclub-chatbot-msg p { margin: 0 0 6px 0; }
.goclub-chatbot-msg p:last-child { margin-bottom: 0; }
.goclub-chatbot-msg h1, .goclub-chatbot-msg h2, .goclub-chatbot-msg h3,
.goclub-chatbot-msg h4, .goclub-chatbot-msg h5, .goclub-chatbot-msg h6 {
  margin: 4px 0 2px 0;
  font-weight: 600;
  line-height: 1.25;
}
.goclub-chatbot-msg h1 { font-size: 17px; }
.goclub-chatbot-msg h2 { font-size: 15px; }
.goclub-chatbot-msg h3 { font-size: 14px; }
.goclub-chatbot-msg ul, .goclub-chatbot-msg ol {
  margin: 4px 0;
  padding-left: 18px;
}
.goclub-chatbot-msg li {
  margin: 2px 0;
  line-height: 1.4;
}
.goclub-chatbot-msg blockquote {
  margin: 8px 0;
  padding: 8px 14px;
  border-left: 3px solid #a33d23;
  background: rgba(255, 218, 210, 0.42);
  color: rgba(27, 28, 26, 0.78);
  border-radius: 0 0.6rem 0.6rem 0;
}
.goclub-chatbot-msg table {
  border-collapse: collapse;
  margin: 10px 0;
  width: 100%;
  font-size: 13px;
  border-radius: 0.6rem;
  overflow: hidden;
  border: 1px solid rgba(112, 121, 120, 0.14);
}
.goclub-chatbot-msg th, .goclub-chatbot-msg td {
  border: 1px solid rgba(112, 121, 120, 0.14);
  padding: 8px 12px;
  text-align: left;
}
.goclub-chatbot-msg th {
  background: rgba(0, 75, 73, 0.07);
  font-weight: 600;
  color: #1b1c1a;
}
.goclub-chatbot-msg a { color: #0d4d4b; text-decoration: none; }
.goclub-chatbot-msg a:hover { color: #6b2bd9; text-decoration: underline; }
.goclub-chatbot-msg hr {
  border: none;
  border-top: 1px solid rgba(112, 121, 120, 0.14);
  margin: 12px 0;
}
.goclub-chatbot-resize-handle {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 32px;
  cursor: move;
  display: flex;
  align-items: center;
  padding-left: 16px;
  opacity: 0.4;
  transition: opacity 0.2s;
}
.goclub-chatbot-window:hover .goclub-chatbot-resize-handle { opacity: 0.7; }
.goclub-chatbot-resize-handle::after {
  content: "━";
  color: rgba(255,255,255,0.8);
  font-size: 18px;
  letter-spacing: 4px;
}
.goclub-chatbot-msg .tool-call {
  background: #f0f0f3;
  border: 1px solid #e0e1e6;
  border-radius: 8px;

  font-size: 13px;
  color: #60646c;
}
.goclub-chatbot-msg .tool-call::before {
  content: "🔧 tool_call";
  font-weight: 600;
  color: #1c2024;
  display: block;
  margin-bottom: 4px;
}
.goclub-chatbot-input-area {
  padding: 12px 16px;
  border-top: 1px solid rgba(112, 121, 120, 0.14);
  display: flex;
  gap: 10px;
  background: rgba(255, 255, 255, 0.84);
}
.goclub-chatbot-input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid rgba(112, 121, 120, 0.2);
  border-radius: 999px;
  font-size: 14px;
  outline: none;
  resize: none;
  font-family: inherit;
  max-height: 100px;
  background: rgba(255, 255, 255, 0.92);
  color: #1b1c1a;
  transition: border-color 0.18s ease, box-shadow 0.18s ease;
}
.goclub-chatbot-input:focus {
  border-color: rgba(0, 75, 73, 0.4);
  box-shadow: 0 0 0 3px rgba(149, 209, 206, 0.28);
}
.goclub-chatbot-send {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, #003331, #004b49);
  color: white;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;

}
.goclub-chatbot-send:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(0, 51, 49, 0.24);
}
.goclub-chatbot-send:disabled {
  background: rgba(112, 121, 120, 0.3);

}
.goclub-chatbot-welcome {

}
@media (max-width: 440px) {
  .goclub-chatbot-window {
    width: calc(100vw - 32px);

  }
}
</style>
<div class="goclub-chatbot">
  <div class="goclub-chatbot-window" id="goclubChatWindow">
    <div class="goclub-chatbot-header">
      <h3>AI 助手</h3>
      <button id="goclubChatCloseBtn" title="关闭">×</button>
    </div>
    <div class="goclub-chatbot-settings">
      <button class="goclub-chatbot-settings-toggle" id="goclubChatSettingsToggle">API 设置</button>
      <div class="goclub-chatbot-settings-panel" id="goclubChatSettingsPanel">
        <label>Base URL</label>
        <input type="text" id="goclubChatBaseUrl" placeholder="https://api.openai.com/v1 (仅支持 OpenAI 兼容接口)">
        <label>API Key</label>
        <input type="password" id="goclubChatApiKey" placeholder="sk-...">
        <label>模型</label>
        <input type="text" id="goclubChatModel" placeholder="">
      </div>
    </div>
    <div class="goclub-chatbot-presets" id="goclubChatPresets">
      <button class="goclub-chatbot-preset">总结页面</button>
      <button class="goclub-chatbot-preset">列出要点</button>
      <button class="goclub-chatbot-preset">推荐相关</button>
    </div>
    <div class="goclub-chatbot-messages" id="goclubChatMessages">
      <div class="goclub-chatbot-welcome">输入问题或点击上方快捷按钮</div>
    </div>
    <div class="goclub-chatbot-input-area">
      <textarea class="goclub-chatbot-input" id="goclubChatInput" placeholder="问我关于这个页面的问题..." rows="1"></textarea>
      <button class="goclub-chatbot-send" id="goclubChatSend" title="发送">↑</button>
    </div>
    <div class="goclub-chatbot-resize-handle"></div>
  </div>
  <button class="goclub-chatbot-toggle" id="goclubChatToggle" title="AI 助手">💬</button>
</div>
<script>
(function() {
  var STORAGE_KEY = 'goclub_chatbot';
  var pageKey = STORAGE_KEY + '_' + location.pathname;
  var windowEl = document.getElementById('goclubChatWindow');
  var toggleBtn = document.getElementById('goclubChatToggle');
  var closeBtn = document.getElementById('goclubChatCloseBtn');
  var settingsToggle = document.getElementById('goclubChatSettingsToggle');
  var settingsPanel = document.getElementById('goclubChatSettingsPanel');
  var baseUrlInput = document.getElementById('goclubChatBaseUrl');
  var apiKeyInput = document.getElementById('goclubChatApiKey');
  var modelInput = document.getElementById('goclubChatModel');
  var messagesEl = document.getElementById('goclubChatMessages');
  var inputEl = document.getElementById('goclubChatInput');
  var sendBtn = document.getElementById('goclubChatSend');
  var presetsEl = document.getElementById('goclubChatPresets');

  var isOpen = false;
  var isLoading = false;

  var state = {
    baseUrl: '',
    apiKey: '',
    model: '',
    messages: []
  };

  function loadState() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        var cfg = JSON.parse(saved);
        state.baseUrl = cfg.baseUrl || '';
        state.apiKey = cfg.apiKey || '';
        state.model = cfg.model || '';
      }
      var pageData = localStorage.getItem(pageKey);
      if (pageData) {
        state.messages = JSON.parse(pageData);
      }
    } catch(e) {}
  }

  function saveConfig() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        baseUrl: state.baseUrl,
        apiKey: state.apiKey,
        model: state.model
      }));
    } catch(e) {}
  }

  function saveMessages() {
    try {
      localStorage.setItem(pageKey, JSON.stringify(state.messages));
    } catch(e) {}
  }

  function getPageContent() {
    var content = '';
    var article = document.querySelector('.markdown.book-article') || document.querySelector('article') || document.querySelector('main');
    if (article) {
      content = article.innerText || article.textContent || '';
    } else {
      content = document.body.innerText || document.body.textContent || '';
    }
    return content.slice(0, 8000);
  }

  function renderMessages() {
    if (state.messages.length === 0) {
      messagesEl.innerHTML = '<div class="goclub-chatbot-welcome">输入问题或点击上方快捷按钮</div>';
      return;
    }
    messagesEl.innerHTML = state.messages.map(function(m) {
      var content = m.role === 'user' ? m.content : sanitizeSpecialTags(m.content);
      var html = m.role === 'user' ? escapeHtml(content) : marked.parse(content);
      return '<div class="goclub-chatbot-msg ' + m.role + '">' + html + '</div>';
    }).join('');
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // 处理特殊标签，如 <think>、<answer>、<tool_call> 等，防止被浏览器解析
  function sanitizeSpecialTags(text) {
    // 匹配常见的大模型输出标签
    var specialTags = [
      /<think>[\s\S]*?<\/think>/gi,
      /<\/?think>[\s\S]*?<\/?think>/gi,
      /<\/?answer>[\s\S]*?<\/?answer>/gi,
      /<\/?tool_call>[\s\S]*?<\/?tool_call>/gi,
      /<\/?tool_call>[\s\S]*?/gi,
      /<\/?reasoning>[\s\S]*?<\/?reasoning>/gi
    ];

    specialTags.forEach(function(pattern) {
      text = text.replace(pattern, function(match) {
        // 将标签内容包裹在 pre.code-block 中显示
        var label = match.match(/<\/?(\w+)/);
        label = label ? label[1] : 'content';
        return '\n```' + label + '\n' + match.replace(/<[^>]+>/g, '') + '\n```\n';
      });
    });

    return text;
  }

  function addMessage(role, content) {
    state.messages.push({ role: role, content: content });
    saveMessages();
    renderMessages();
  }

  function setLoading(loading) {
    isLoading = loading;
    sendBtn.disabled = loading;
    sendBtn.textContent = loading ? '...' : '↑';
    inputEl.disabled = loading;
  }

  async function sendMessage(userContent) {
    if (!userContent.trim()) return;
    if (!state.baseUrl || !state.apiKey) {
      addMessage('assistant', '请先在设置中配置 Base URL 和 API Key');
      return;
    }

    addMessage('user', userContent);
    setLoading(true);

    var pageContent = getPageContent();
    var systemPrompt = '你是一个助手，基于以下页面内容回答用户的问题。如果页面内容中没有相关信息，请说明你无法从页面内容中找到答案。\n\n页面内容：\n' + pageContent;

    var slidingWindow = state.messages.slice(-5);
    var messages = [{ role: 'system', content: systemPrompt }].concat(slidingWindow);

    try {
      var response = await fetch(state.baseUrl + '/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + state.apiKey
        },
        body: JSON.stringify({
          model: state.model,
          messages: messages
        })
      });

      if (!response.ok) {
        var errData = await response.json().catch(function() { return {}; });
        throw new Error(errData.error?.message || '请求失败: ' + response.status);
      }

      var data = await response.json();
      var assistantMessage = data.choices[0]?.message?.content || '';
      if (assistantMessage) {
        addMessage('assistant', assistantMessage);
      } else {
        addMessage('assistant', '未收到有效回复');
      }
    } catch(e) {
      addMessage('assistant', '错误: ' + e.message);
    }

    setLoading(false);
  }

  function handlePreset(e) {
    var btn = e.target.closest('.goclub-chatbot-preset');
    if (!btn) return;
    var text = btn.textContent;
    var userContent = '';
    if (text === '总结页面') {
      userContent = '请用一段话总结这个页面的主要内容';
    } else if (text === '列出要点') {
      userContent = '列出这个页面的3-5个关键要点';
    } else if (text === '推荐相关') {
      userContent = '基于这个页面的内容，推荐3个相关的深入学习方向';
    } else {
      userContent = text;
    }
    sendMessage(userContent);
  }

  toggleBtn.addEventListener('click', function() {
    isOpen = !isOpen;
    windowEl.classList.toggle('open', isOpen);
    toggleBtn.textContent = isOpen ? '×' : '💬';
    if (isOpen) {
      baseUrlInput.value = state.baseUrl;
      apiKeyInput.value = state.apiKey;
      modelInput.value = state.model;
    }
  });

  closeBtn.addEventListener('click', function() {
    isOpen = false;
    windowEl.classList.remove('open');
    toggleBtn.textContent = '💬';
  });

  settingsToggle.addEventListener('click', function() {
    settingsToggle.classList.toggle('open');
    settingsPanel.classList.toggle('open');
  });

  baseUrlInput.addEventListener('change', function() {
    state.baseUrl = baseUrlInput.value.trim();
    saveConfig();
  });

  apiKeyInput.addEventListener('change', function() {
    state.apiKey = apiKeyInput.value.trim();
    saveConfig();
  });

  modelInput.addEventListener('change', function() {
    state.model = modelInput.value.trim();
    saveConfig();
  });

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isLoading) {
        sendMessage(inputEl.value);
        inputEl.value = '';
      }
    }
  });

  sendBtn.addEventListener('click', function() {
    if (!isLoading) {
      sendMessage(inputEl.value);
      inputEl.value = '';
    }
  });

  presetsEl.addEventListener('click', handlePreset);

  // 拖动调整大小 - 从顶部拖动可改变宽度和高度
  (function() {
    var resizeHandle = windowEl.querySelector('.goclub-chatbot-resize-handle');
    var isResizing = false;
    var startX, startY, startWidth, startHeight;
    var resizeMode = null; // 'width', 'height', or 'both'

    resizeHandle.addEventListener('mousedown', function(e) {
      isResizing = true;
      startX = e.clientX;
      startY = e.clientY;
      startWidth = windowEl.offsetWidth;
      startHeight = windowEl.offsetHeight;
      // 根据初始移动方向决定resize模式
      document.body.style.cursor = 'ns-resize';
      e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
      if (!isResizing) return;
      var dx = e.clientX - startX;
      var dy = e.clientY - startY;

      // 斜着拖动时同时改变宽度和高度
      // 向左拖变宽，向右拖变窄
      if (Math.abs(dx) > 10) {
        var newWidth = Math.max(300, Math.min(window.innerWidth * 0.9, startWidth - dx));
        windowEl.style.width = newWidth + 'px';
      }
      // 向上拖变长，向下拖变短
      if (Math.abs(dy) > 10) {
        var newHeight = Math.max(300, Math.min(window.innerHeight * 0.8, startHeight - dy));
        windowEl.style.height = newHeight + 'px';
      }
    });

    document.addEventListener('mouseup', function() {
      if (isResizing) {
        isResizing = false;
        document.body.style.cursor = '';
      }
    });
  })();

  loadState();
  renderMessages();
  baseUrlInput.value = state.baseUrl;
  apiKeyInput.value = state.apiKey;
  modelInput.value = state.model;
})();
</script>
<script>
  (function () {
    var storageKey = "goclub.sidebar.collapsed";
    var desktopQuery = window.matchMedia("(min-width: 56rem)");
    var body = document.body;
    var menuToggle = document.querySelector("[data-sidebar-toggle]");
    var menuControl = document.getElementById("menu-control");
    var tocControl = document.getElementById("toc-control");

    function setCollapsed(collapsed) {
      body.classList.toggle("sidebar-collapsed", collapsed);

      if (menuToggle) {
        var icon = menuToggle.querySelector(".sidebar-toggle-icon");
        menuToggle.setAttribute("aria-expanded", collapsed ? "false" : "true");
        menuToggle.setAttribute("aria-label", collapsed ? "展开侧边栏" : "收起侧边栏");

        if (icon) {
          icon.textContent = collapsed ? "›" : "‹";
        }
      }
    }

    function syncViewportState() {
      if (!desktopQuery.matches) {
        body.classList.remove("sidebar-collapsed");
        if (menuControl) {
          menuControl.checked = false;
        }
        if (tocControl) {
          tocControl.checked = false;
        }
        return;
      }

      setCollapsed(localStorage.getItem(storageKey) === "true");
    }

    if (menuToggle) {
      menuToggle.addEventListener("click", function () {
        if (!desktopQuery.matches) {
          if (menuControl) {
            menuControl.checked = !menuControl.checked;
          }
          return;
        }

        var nextCollapsed = !body.classList.contains("sidebar-collapsed");
        setCollapsed(nextCollapsed);
        localStorage.setItem(storageKey, String(nextCollapsed));
      });
    }

    if (desktopQuery.addEventListener) {
      desktopQuery.addEventListener("change", syncViewportState);
    } else if (desktopQuery.addListener) {
      desktopQuery.addListener(syncViewportState);
    }

    syncViewportState();
  })();
</script>
<script>
  (function () {
    var blocks = document.querySelectorAll('details.qa-answer');
    blocks.forEach(function (el) {
      var summary = el.querySelector('summary.qa-answer-toggle');
      if (!summary) return;
      var update = function () {
        summary.textContent = el.open ? '收起答案' : '查看答案';
      };
      el.addEventListener('toggle', update);
      update();
    });
  })();
</script>
