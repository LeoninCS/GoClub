<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频Feed流系统（hard）学习</title>
<style>
:root{
  --bg:#fafafa;--bg2:#f0f0f0;--bg3:#e4e4e7;--fg:#18181b;--fg2:#71717a;--fg3:#a1a1aa;
  --card:#fff;--border:#e4e4e7;--accent:#6366f1;--accent2:#4f46e5;--accent-soft:#eef2ff;--accent-glow:rgba(99,102,241,.16);
  --success:#22c55e;--success-soft:#f0fdf4;--warn:#f59e0b;--warn-soft:#fffbeb;--danger:#ef4444;--danger-soft:#fef2f2;--info:#3b82f6;--info-soft:#eff6ff;
  --code-bg:#f4f4f5;--code-border:#e4e4e7;--shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow-md:0 4px 14px rgba(0,0,0,.08);
  --sidebar-w:292px;--topnav-h:56px;--radius:10px;--radius-sm:6px;--font-body:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--font-mono:'JetBrains Mono','Fira Code',Consolas,monospace;
  --lv1:#22c55e;--lv1-soft:#f0fdf4;--lv2:#3b82f6;--lv2-soft:#eff6ff;--lv3:#f59e0b;--lv3-soft:#fffbeb;
  --noise:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}
[data-theme="dark"]{
  --bg:#09090b;--bg2:#18181b;--bg3:#27272a;--fg:#fafafa;--fg2:#a1a1aa;--fg3:#71717a;
  --card:#18181b;--border:#27272a;--accent:#818cf8;--accent2:#6366f1;--accent-soft:#1e1b4b;--accent-glow:rgba(129,140,248,.14);
  --success-soft:#052e16;--warn-soft:#451a03;--danger-soft:#450a0a;--info-soft:#172554;--code-bg:#1e1e22;--code-border:#2e2e33;--shadow-sm:0 1px 2px rgba(0,0,0,.35);--shadow-md:0 4px 16px rgba(0,0,0,.45);
  --lv1-soft:#052e16;--lv2-soft:#172554;--lv3-soft:#451a03;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{min-height:100vh;background:var(--bg);color:var(--fg);font-family:var(--font-body);font-size:15px;line-height:1.7;transition:background .25s,color .25s}
a{color:var(--accent);text-decoration:none}
button{border:0;background:none;color:inherit;font:inherit;cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--fg3);border-radius:10px}
.topnav{height:var(--topnav-h);display:flex;align-items:center;gap:10px;padding:0 20px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:10px;margin-right:auto;white-space:nowrap}
.brand-icon{width:32px;height:32px;border-radius:9px;background:#e0f7fa;border:1px solid rgba(15,118,140,.18);display:grid;place-items:center;box-shadow:0 2px 8px var(--accent-glow);overflow:hidden}
.brand-icon svg{width:30px;height:30px}
.brand-text{font-size:15px;font-weight:800}.brand-sub{font-size:11px;color:var(--fg3);margin-left:4px}
.mode-tabs{display:flex;background:var(--bg2);border-radius:8px;padding:3px;gap:2px}
.mode-btn{padding:5px 14px;border-radius:6px;font-size:13px;font-weight:600;color:var(--fg2);transition:all .2s}
.mode-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px var(--accent-glow)}
.mode-btn:hover{background:var(--bg3);color:var(--fg)}
.mode-btn.active:hover{background:var(--accent);color:#fff}
.repo-link,.light-link{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--fg2);font-size:13px;font-weight:600;line-height:1;white-space:nowrap;transition:all .2s}
.repo-link:hover,.light-link:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--fg3);pointer-events:none}
.search-box{width:210px;padding:6px 12px 6px 32px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--fg);font-size:13px;outline:none;transition:all .2s}
.search-box:focus{width:280px;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.theme-btn{width:32px;height:32px;border-radius:8px;color:var(--fg2);display:grid;place-items:center;font-size:16px}.theme-btn:hover{background:var(--bg2);color:var(--fg)}
.progress-pill{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:var(--success-soft);border:1px solid rgba(34,197,94,.24);font-size:12px;font-weight:700;color:var(--success)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
.app{display:flex;height:calc(100vh - var(--topnav-h));overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:3px}
.side-title{padding:8px 10px 4px;color:var(--fg3);font-size:11px;font-weight:900;letter-spacing:.8px;text-transform:uppercase}
.side-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);color:var(--fg2);font-size:13px;cursor:pointer;transition:all .16s}
.side-item:hover{background:var(--bg2);color:var(--fg)}
.side-item.active{background:var(--accent-soft);color:var(--accent);font-weight:800}
.side-main{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:10px;padding:1px 7px;border-radius:12px;background:var(--bg3);color:var(--fg3);font-weight:700;flex-shrink:0}
.side-item.active .badge{background:var(--accent);color:#fff}
.sub-list{margin-left:10px;padding-left:8px;border-left:1px solid var(--border);display:none}
.sub-list.open{display:block}
.sub-item{padding:5px 8px;border-radius:var(--radius-sm);font-size:12.5px;color:var(--fg3);cursor:pointer;line-height:1.45;margin:1px 0}
.sub-item:hover{background:var(--bg2);color:var(--fg)}
.sub-item.active{background:var(--accent-soft);color:var(--accent);font-weight:700}
.main{flex:1;overflow-y:auto;padding:32px 40px 64px}
.content-header{margin-bottom:24px;animation:fadeUp .35s ease}
.content-header h1{font-size:26px;line-height:1.3;font-weight:900;background:linear-gradient(135deg,var(--fg) 58%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{margin-top:5px;color:var(--fg3);font-size:13px}
.hero,.section-card,.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);animation:fadeUp .35s ease}
.hero{padding:30px 34px;margin-bottom:20px}
.kicker{font-size:11px;font-weight:900;color:var(--accent);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.hero h2{font-size:28px;line-height:1.28;font-weight:900;margin-bottom:10px}
.hero p{color:var(--fg2);font-size:14.5px;line-height:1.85;max-width:900px}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.pill{padding:4px 10px;border-radius:20px;background:var(--accent-soft);border:1px solid var(--accent-glow);color:var(--accent);font-size:12px;font-weight:800}
.mentor-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin:0 0 20px}
.mentor-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-sm);animation:fadeUp .3s ease}
.mentor-card strong{display:block;font-size:13px;font-weight:850;color:var(--fg);margin-bottom:5px}
.mentor-card p{font-size:12.8px;color:var(--fg2);line-height:1.65;margin:0}
.answer-framework{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:12px 0 4px}
.framework-step{background:var(--accent-soft);border:1px solid var(--accent-glow);border-radius:var(--radius-sm);padding:10px 12px;color:var(--accent);font-size:12.5px;font-weight:850;line-height:1.45}
.score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-top:10px}
.score-card{padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2)}
.score-card strong{display:block;font-size:13px;color:var(--fg);margin-bottom:4px}
.score-card p{font-size:12.8px;color:var(--fg2);line-height:1.6;margin:0}
.microcopy{margin-top:10px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--info-soft);border-left:3px solid var(--info);font-size:13px;color:var(--fg2);line-height:1.7}
.markdown-doc{max-width:940px;margin:0 auto;animation:fadeUp .35s}
.markdown-doc h1{font-size:30px;line-height:1.25;font-weight:900;color:var(--fg);margin:4px 0 12px}
.markdown-doc h2{font-size:21px;line-height:1.35;font-weight:850;color:var(--fg);margin:32px 0 12px;padding-top:18px;border-top:1px solid var(--border)}
.markdown-doc h3{font-size:15px;font-weight:850;color:var(--fg);margin:18px 0 8px}
.markdown-doc p{font-size:15px;color:var(--fg2);line-height:1.9;margin:10px 0}
.markdown-doc ul,.markdown-doc ol{margin:10px 0 10px 22px;color:var(--fg2);font-size:14.5px;line-height:1.85}
.markdown-doc li{margin:5px 0}
.markdown-doc blockquote{margin:18px 0;padding:12px 16px;border-left:4px solid var(--accent);background:var(--accent-soft);border-radius:0 var(--radius-sm) var(--radius-sm) 0;color:var(--fg2)}
.markdown-doc hr{border:0;border-top:1px solid var(--border);margin:26px 0}
.markdown-doc code{font-family:var(--font-mono);font-size:13px;color:var(--accent);background:var(--code-bg);border:1px solid var(--code-border);border-radius:4px;padding:2px 6px}
.md-kicker{font-size:11px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.md-section{padding:2px 0 8px;border-radius:var(--radius-sm)}
.md-section.active{background:linear-gradient(90deg,var(--accent-soft),transparent 72%);padding-left:14px;margin-left:-14px}
.md-pill-row{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 22px}
.md-pill{padding:4px 10px;border-radius:20px;background:var(--accent-soft);border:1px solid var(--accent-glow);color:var(--accent);font-size:12px;font-weight:800}
/* ═══════════ PREMIUM GLASS SKIN ═══════════ */
:root{
  --glass:rgba(255,255,255,.72);
  --glass-strong:rgba(255,255,255,.86);
  --glass-soft:rgba(255,255,255,.48);
  --glass-border:rgba(255,255,255,.66);
  --hairline:rgba(24,24,27,.09);
  --shadow-glass:0 18px 46px rgba(15,23,42,.10),0 1px 0 rgba(255,255,255,.72) inset;
  --shadow-float:0 10px 28px rgba(15,23,42,.08);
}
[data-theme="dark"]{
  --glass:rgba(24,24,27,.64);
  --glass-strong:rgba(39,39,42,.78);
  --glass-soft:rgba(39,39,42,.42);
  --glass-border:rgba(255,255,255,.10);
  --hairline:rgba(255,255,255,.08);
  --shadow-glass:0 18px 48px rgba(0,0,0,.34),0 1px 0 rgba(255,255,255,.08) inset;
  --shadow-float:0 12px 34px rgba(0,0,0,.28);
}
body{background:linear-gradient(180deg,#f7f8fb 0%,#eef2f7 46%,#fbfcfd 100%) fixed}
[data-theme="dark"] body{background:linear-gradient(180deg,#09090b 0%,#111318 48%,#08090b 100%) fixed}
body::before{content:'';position:fixed;inset:0;background:var(--noise);pointer-events:none;z-index:9999;opacity:.24;mix-blend-mode:multiply}
[data-theme="dark"] body::before{opacity:.12;mix-blend-mode:screen}
.topnav{background:var(--glass-strong);border-bottom:1px solid var(--glass-border);box-shadow:0 10px 30px rgba(15,23,42,.06);backdrop-filter:blur(24px) saturate(1.35);-webkit-backdrop-filter:blur(24px) saturate(1.35)}
.sidebar{background:var(--glass);border-right:1px solid var(--glass-border);box-shadow:1px 0 0 var(--hairline),12px 0 38px rgba(15,23,42,.04);backdrop-filter:blur(26px) saturate(1.35);-webkit-backdrop-filter:blur(26px) saturate(1.35)}
.mode-tabs,.search-box,.repo-link,.light-link,.theme-btn{background:var(--glass-soft);border:1px solid var(--glass-border);box-shadow:0 1px 0 rgba(255,255,255,.45) inset}
.mode-btn.active{background:linear-gradient(180deg,#24242a,#111113);color:#fff;box-shadow:0 8px 20px rgba(17,17,19,.18),0 1px 0 rgba(255,255,255,.18) inset}
[data-theme="dark"] .mode-btn.active{background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.10));box-shadow:0 8px 24px rgba(0,0,0,.32),0 1px 0 rgba(255,255,255,.16) inset}
.hero,.section-card,.panel,.quiz-item,.card-face,.search-result,.mentor-card,.score-card,.lv-block{background:var(--glass);border:1px solid var(--glass-border);box-shadow:var(--shadow-glass);backdrop-filter:blur(22px) saturate(1.28);-webkit-backdrop-filter:blur(22px) saturate(1.28)}
.hero:hover,.section-card:hover,.panel:hover,.search-result:hover,.mentor-card:hover{box-shadow:var(--shadow-glass),0 0 0 1px rgba(99,102,241,.10);transform:translateY(-1px)}
.source-item,pre,.framework-step,.md-pill,.pill,.sub-item.active,.side-item.active,.badge{background:rgba(255,255,255,.56);border-color:var(--glass-border);box-shadow:0 1px 0 rgba(255,255,255,.55) inset}
[data-theme="dark"] .source-item,[data-theme="dark"] pre,[data-theme="dark"] .framework-step,[data-theme="dark"] .md-pill,[data-theme="dark"] .pill,[data-theme="dark"] .sub-item.active,[data-theme="dark"] .side-item.active,[data-theme="dark"] .badge{background:rgba(255,255,255,.07);border-color:var(--glass-border);box-shadow:0 1px 0 rgba(255,255,255,.08) inset}
.markdown-doc blockquote,.microcopy,.progress-pill{background:var(--glass-soft);border:1px solid var(--glass-border);box-shadow:var(--shadow-float);backdrop-filter:blur(18px) saturate(1.25);-webkit-backdrop-filter:blur(18px) saturate(1.25)}
.markdown-doc h1,.content-header h1{text-shadow:0 1px 0 rgba(255,255,255,.35)}
[data-theme="dark"] .markdown-doc h1,[data-theme="dark"] .content-header h1{text-shadow:0 1px 0 rgba(0,0,0,.35)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:20px}
.panel{padding:22px 24px}
.panel h3,.section-card h2{font-size:17px;font-weight:850;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.panel h3::before,.section-card h2::before{content:'';width:3px;height:18px;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:2px}
.panel p,.section-card p{color:var(--fg2);font-size:14px;line-height:1.8;margin:8px 0}
.panel ul,.section-card ul,.section-card ol{margin:8px 0 8px 20px;color:var(--fg2);font-size:14px}
.panel li,.section-card li{margin:5px 0;line-height:1.7}
.source-list{display:flex;flex-direction:column;gap:8px}
.source-item{padding:9px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2);font-family:var(--font-mono);font-size:12px;color:var(--fg2);line-height:1.45;word-break:break-all}
.checkline{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13.5px;color:var(--fg2)}
.checkline:last-child{border-bottom:0}.checkline span:first-child{width:18px;height:18px;border-radius:5px;background:var(--success-soft);color:var(--success);display:grid;place-items:center;font-size:11px;font-weight:900;flex-shrink:0;margin-top:2px}
.section-card{padding:28px 32px;margin-bottom:20px}
.lv-block{margin:12px 0;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.lv-block.lv1{border-left:3px solid var(--lv1)}.lv-block.lv2{border-left:3px solid var(--lv2)}.lv-block.lv3{border-left:3px solid var(--lv3)}
.lv-header{display:flex;align-items:center;gap:8px;padding:12px 16px;font-size:14px;font-weight:800;cursor:pointer;user-select:none}
.lv-block.lv1 .lv-header{background:var(--lv1-soft);color:var(--lv1)}.lv-block.lv2 .lv-header{background:var(--lv2-soft);color:var(--lv2)}.lv-block.lv3 .lv-header{background:var(--lv3-soft);color:var(--lv3)}
.lv-arrow{font-size:10px;transition:transform .2s;color:var(--fg3)}.lv-header.open .lv-arrow{transform:rotate(90deg)}
.lv-tag{font-size:10px;padding:2px 8px;border-radius:10px;color:#fff;letter-spacing:.5px;text-transform:uppercase}.lv1 .lv-tag{background:var(--lv1)}.lv2 .lv-tag{background:var(--lv2)}.lv3 .lv-tag{background:var(--lv3)}
.lv-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);padding:0 16px}.lv-body.open{max-height:4000px;padding:0 16px 16px}
.lv-body p,.lv-body li{color:var(--fg2);font-size:14px;line-height:1.8}.lv-body ul,.lv-body ol{margin:8px 0 8px 20px}.lv-body strong{color:var(--fg)}
code.inline{background:var(--code-bg);border:1px solid var(--code-border);border-radius:4px;padding:2px 6px;color:var(--accent);font-family:var(--font-mono);font-size:12.5px}
pre{background:var(--code-bg);border:1px solid var(--code-border);border-radius:var(--radius);padding:16px 18px;overflow:auto;font-family:var(--font-mono);font-size:12.5px;line-height:1.6;margin:12px 0;color:var(--fg)}
.quiz-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin:10px 0;overflow:hidden;animation:fadeUp .25s ease}
.quiz-q{padding:14px 18px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;font-weight:700;font-size:14px}.quiz-q:hover{background:var(--bg2)}
.q-num{width:24px;height:24px;border-radius:6px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:11px;flex-shrink:0}.q-text{flex:1}.q-toggle{font-size:10px;color:var(--fg3);margin-top:6px;transition:transform .2s}.q-toggle.open{transform:rotate(90deg)}
.quiz-body{max-height:0;overflow:hidden;transition:max-height .28s}.quiz-body.open{max-height:900px}
.quiz-hint{margin:0 18px 14px;padding:14px 16px;background:var(--warn-soft);border-left:3px solid var(--warn);border-radius:var(--radius-sm);font-size:13.5px;color:var(--fg2);line-height:1.7}
.quiz-btns{display:flex;gap:8px;margin:0 18px 14px}.quiz-btn{padding:5px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:800;color:#fff}.quiz-btn.mastered{background:var(--success)}.quiz-btn.review{background:var(--warn)}
.quiz-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:800;margin-top:3px}.status-mastered{background:var(--success-soft);color:var(--success);border:1px solid rgba(34,197,94,.22)}.status-review{background:var(--warn-soft);color:var(--warn);border:1px solid rgba(245,158,11,.22)}
.nav-bar{display:flex;justify-content:space-between;gap:12px;margin-top:26px;padding-top:18px;border-top:1px solid var(--border)}
.nav-btn,.tool-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:800;border:1px solid var(--border);color:var(--fg2);transition:all .2s}
.nav-btn:hover,.tool-btn:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.nav-btn.primary,.tool-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px var(--accent-glow)}
.nav-btn.primary:hover,.tool-btn.primary:hover{background:var(--accent2);color:#fff}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.timer{font-family:var(--font-mono);font-size:21px;font-weight:800;letter-spacing:1px;color:var(--accent);background:var(--accent-soft);border-radius:var(--radius-sm);padding:4px 12px;min-width:88px;text-align:center}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
.card{perspective:1200px;height:330px;cursor:pointer;animation:fadeUp .3s ease}.card-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d}.card.flipped .card-inner{transform:rotateY(180deg)}

<script>
const introData={
  title:"视频Feed流系统（hard）15天项目学习",
  desc:"视频Feed流系统（hard）基于 GCFeed 仓库，是一个更完整的短视频 Feed 工程：后端采用 Domain、Application、Infrastructure、Interfaces 四层结构，覆盖账户、视频、Feed、互动、关系、推荐、曝光、Embedding、Web 客户端和测试。hard 版学习目标是把“能跑的项目”拆成可讲、可改、可面试的工程闭环。",
  repo:"https://github.com/LeoninCS/GCFeed",
  pillars:[
    {title:"项目介绍",text:"这是一个短视频 Feed 流 hard 版项目学习页，基于 LeoninCS/GCFeed 仓库整理。项目覆盖账户、视频发布、timeline、hot、following、recommend、互动、曝光、Embedding、Web 客户端和测试，适合把 Feed 系统从能运行一路学到能面试。"},
    {title:"前置要求",text:"建议先具备 Go 基础、Gin/GORM、MySQL、Redis、RabbitMQ、HTTP API、JWT、React/Vite、Docker Compose、基础系统设计知识。掌握这些后，阅读源码、理解链路和回答追问会顺很多。"},
    {title:"Level 1：能跑能演示",text:"这一层代表入门完成度：能启动项目，能演示注册、登录、发布视频、刷 Feed、点赞评论、关注、推荐曝光，知道每个功能解决什么业务问题。"},
    {title:"Level 2：面试级理解",text:"这一层代表面试主线完成度：能讲清四层架构、模块边界、核心链路和常见面试问题，能用 2 分钟把项目讲成一个完整工程故事。"},
    {title:"Level 3：抗追问能力",text:"这一层代表二三轮追问完成度：对缓存击穿、MQ 故障、幂等、游标分页、推拉结合、曝光去重、推荐降级等场景有判断和方案。"},
    {title:"Level 4：可独立复刻",text:"这一层代表源码内化完成度：脑子里有目录结构、接口链路、数据表和关键代码形态，可以从零复刻一个可运行版本。"},
    {title:"Level 5：Feed 流之神",text:"这一层代表抽象能力完成度：能把项目升维成通用 Feed 系统方法论，能主动讨论设计边界、容量估算、排序策略和工程演进。"},
    {title:"学习方法",text:"你可以先看我的文档建立路线，再跟着页面每天学习；也可以让页面引导你走完目标、源码入口、核心问题、自检题、面试打法。每天只吃透一个主题。"},
    {title:"最终产出",text:"学完后要有 2 分钟项目介绍、4 条核心链路图、8 个简历亮点、40+ 道面试问答、故障场景清单、扩展设计方案和一套可复盘的源码笔记。"},
    {title:"Offer 冲刺",text:"这页的目标是帮你把项目讲得清楚、答得有证据、追问接得住。认真走完 15 天，你应该能把 Feed 项目变成大厂面试里的强项目。"}
  ],
  prerequisites:["Go 基础与并发模型","Gin / GORM / RESTful API","MySQL 表设计、事务、索引","Redis 缓存、ZSET、Lua、限流","RabbitMQ 消息投递、Ack、异步消费","JWT 鉴权与中间件","React / Vite 基础页面联调","Docker Compose 本地环境","缓存、MQ、一致性、Feed 流系统设计"],
  levels:[
    {title:"Level 1：能跑能演示",text:"学到可以完整演示功能，并能说明每个功能对应的业务价值。"},
    {title:"Level 2：面试级理解",text:"学到可以讲清架构、链路、源码入口和常见面试题。"},
    {title:"Level 3：抗追问能力",text:"学到可以处理特殊场景追问，并能给出工程权衡。"},
    {title:"Level 4：可独立复刻",text:"学到可以关掉文档复刻核心模块，脑子里有代码结构。"},
    {title:"Level 5：Feed 流之神",text:"学到可以抽象出 Feed 系统方法论，现场讨论边界、容量和演进。"}
  ],
  levelStandards:[
    {standard:"能从本地启动到页面体验完整跑一遍。",proof:"能画出用户使用闭环：注册登录 -> 发布视频 -> Feed 分发 -> 互动 -> 曝光反馈。",next:"进入架构和源码入口学习。"},
    {standard:"能用架构图讲清 Domain、Application、Infrastructure、Interfaces。",proof:"能用发布、刷 Feed、互动、推荐曝光四条链路回答主干面试题。",next:"开始准备故障、并发、一致性和降级追问。"},
    {standard:"能解释缓存、MQ、幂等、游标、推拉、推荐、曝光的特殊场景。",proof:"面试官连续追问时，回答能回到源码证据和工程权衡。",next:"把代码结构背到可以复刻。"},
    {standard:"能从零写出最小可运行版本。",proof:"能还原目录结构、接口设计、核心表、Service 编排和缓存/MQ 关键代码。",next:"把项目抽象成通用 Feed 系统设计框架。"},
    {standard:"能从项目上升到系统设计方法论。",proof:"能主动讨论召回、排序、分发、曝光、容量、治理、灰度和演进路线。",next:"把它变成大厂面试的压轴项目。"}
  ],

{q:"软删除和公开视频详情怎么处理？",lv1:`<p>删除视频采用状态更新。公开详情只返回已发布视频，删除或下线状态在公开接口里表现为查询失败。</p>`,lv2:`<p><code class="inline">Delete</code> 先查任意状态视频，再调用领域方法校验作者身份和目标状态。已经删除的记录再次删除返回成功，保证删除接口幂等。</p>`,lv3:`<p><strong>复盘问题：</strong>为什么主表和统计表拆开？删除为什么采用状态字段？上传文件如何通过 /uploads 访问？</p>`}
],tasks:["画出上传文件 -> 发布视频 -> 创建统计表的链路","解释 Idempotency-Key 的并发冲突处理","整理 video 状态机","用测试文件验证重复发布返回同一结果"],quiz:[
{q:"video_stat 保存哪些字段？",hint:"like_count、comment_count、favorite_count。"},
{q:"发布视频时为什么创建 video_stat？",hint:"Feed 和详情读取计数时有稳定来源。"},
{q:"软删除接口如何保证幂等？",hint:"已经删除再次删除仍返回成功。"},
{q:"PublishedEvent 触发哪些后续能力？",hint:"fanout、预热、embedding。"}
]},
{day:5,title:"Timeline Feed 与游标分页",goal:"掌握 timeline scene、cursor 编码、limit+1 和轻量页结果。",focus:["Scene 策略注册表","TimelineStrategy","cursor + limit","FeedPageItem"],sources:["apps/api/internal/application/feed/service.go","apps/api/internal/domain/feed/entity.go","apps/api/internal/infra/persistence/feed/gorm.go","apps/api/internal/interfaces/http/feed/handler.go"],topics:[
{q:"Feed scene 策略注册表是什么？",lv1:`<p>Feed Service 内部维护 scene 到 Strategy 的映射。timeline、hot、following、recommend 都是一个 Strategy，新增场景只要实现接口并注册。</p>`,lv2:`<p><code class="inline">New</code> 默认注册 Timeline、Hot、Following，<code class="inline">WithRecommender</code> 会注册 RecommendStrategy。<code class="inline">GetFeed</code> 根据 scene 找到策略并调用 List。</p>`,lv3:`<p><strong>面试表达：</strong>策略注册表让 Feed 能力从“一个大 if/else”演进为可扩展场景体系，适合扩展本地同城、关注、推荐、热榜等不同 feed。</p>`},
{q:"timeline 游标分页怎么保证稳定？",lv1:`<p>timeline 按 published_at DESC、video_id DESC 排序。游标保存当前页最后一条的 published_at 和 video_id，下一页从它之后继续查。</p>`,lv2:`<p><code class="inline">listPageFromRepo</code> 多取 <code class="inline">limit+1</code> 判断 hasMore，返回时裁掉多余项。游标通过 JSON + Base64 编码返回客户端。</p>`,lv3:`<p><strong>复盘问题：</strong>为什么多取一条能判断 hasMore？同一发布时间下为什么还需要 video_id？cursor 解析失败应该返回什么错误？</p>`}
],tasks:["读懂 GetFeed -> TimelineStrategy.List -> listPageFromRepo","手写 timeline cursor 编码内容","画出 limit+1 判断 hasMore","整理 FeedPageItem 与 FeedItem 的区别"],quiz:[
{q:"hard 版支持哪些 Feed scene？",hint:"timeline、hot、following、recommend。"},
{q:"timeline 游标保存哪些字段？",hint:"published_at 和 video_id。"},
{q:"limit+1 技巧用于什么？",hint:"判断 has_more。"},
{q:"FeedPageItem 保存什么？",hint:"轻量排序与组装字段。"}
]},
{day:6,title:"Feed 缓存、批量组装与 singleflight",goal:"理解页缓存、视频卡片缓存、计数缓存和批量回源。",focus:["page cache","video card cache","video stat cache","MGET + batch repo","singleflight"],sources:["apps/api/internal/application/feed/service.go:loadFeedPage","apps/api/internal/application/feed/service.go:assembleFeedItems","apps/api/internal/infra/cache/feed_cache.go","apps/api/internal/infra/persistence/feed/gorm.go"],topics:[
{q:"为什么 Feed 页缓存只存轻量页？",lv1:`<p>页缓存只保存 video_id、author_id、published_at、hot_score 等轻量字段。视频标题、封面、作者信息和计数单独用 card/stat 缓存批量组装。</p>`,lv2:`<p><code class="inline">loadFeedPage</code> 负责页缓存和 singleflight。<code class="inline">assembleFeedItems</code> 先 MGET cards/stats，缺失的 ID 通过仓储批量回源，再写回 Redis。</p>`,lv3:`<p><strong>面试表达：</strong>轻量页缓存让分页排序结果稳定，card/stat 拆分让高频计数拥有更短 TTL。首页 5 秒，后续页 45 秒，卡片 15 分钟，计数 15 秒。</p>`},
{q:"singleflight 在这里解决什么问题？",lv1:`<p>同一个 Feed 页缓存过期时，并发请求会争抢回源。singleflight 把同 key 的并发回源合并成一次，其他请求共享结果。</p>`,lv2:`<p>代码中 group key 使用 <code class="inline">feedPageCacheKey(scene,cursor,limit)</code>，回源前还会 double-check 一次缓存，回源成功后设置带抖动的 TTL。</p>`,lv3:`<p><strong>复盘问题：</strong>首页 TTL 为什么短？后续页 TTL 为什么更长？缓存 key 为什么要 hash cursor？MGET 失败时系统如何继续工作？</p>`}
],tasks:["列出四类缓存 key 和 TTL","画出 assembleFeedItems 的 MGET -> missing -> batch repo -> set cache 流程","解释 singleflight 的 key 设计","分析首页缓存和后续页缓存差异"],quiz:[
{q:"Feed 首页 TTL 是多少？",hint:"5 秒 + 抖动。"},
{q:"Feed 后续页 TTL 是多少？",hint:"45 秒 + 抖动。"},
{q:"视频卡片缓存 TTL 是多少？",hint:"15 分钟。"},
{q:"视频计数缓存 TTL 是多少？",hint:"15 秒。"}
]},
{day:7,title:"Hot Feed 与分钟桶热榜",goal:"掌握热度分、分钟桶、窗口合并、offset 游标和降级仓储路径。",focus:["ZSET 分钟桶","ZUNIONSTORE","热度权重","window cursor"],sources:["apps/api/internal/application/feed/service.go:HotStrategy","apps/api/internal/infra/cache/feed_cache.go:AddHotScore","apps/api/internal/domain/feed/entity.go:ScoreHotFeedItem","apps/api/internal/application/interaction/service.go"],topics:[
{q:"Hot Feed 怎么计算热度？",lv1:`<p>热度来自点赞、收藏、评论。权重为点赞 3 分、收藏 4 分、评论 5 分，取消行为写入负分。Redis 中每分钟一个 ZSET 桶。</p>`,lv2:`<p><code class="inline">AddHotScore</code> 写入 <code class="inline">feed:hot:minute:v1:{yyyyMMddHHmm}</code>，TTL 为 2 小时。查询时 <code class="inline">ZUNIONSTORE</code> 合并最近 60 个桶到窗口 key，窗口 key TTL 2 分钟。</p>`,lv3:`<p><strong>面试表达：</strong>分钟桶让写入实时、查询可缓存，窗口 key 复用当前一分钟内的热榜结果，offset 游标保证同一窗口翻页稳定。</p>`},
{q:"Hot cursor 为什么用 windowEnd + offset？",lv1:`<p>Redis 热榜查询基于固定窗口快照，cursor 保存 windowEnd 和 offset。下一页复用同一窗口，避免第一页和第二页基于不同热榜快照。</p>`,lv2:`<p><code class="inline">listPageFromHotWindow</code> 解析 cursor 后固定 windowEnd，offset 从上一页延续。新请求无 cursor 时使用当前 UTC 分钟。</p>`,lv3:`<p><strong>复盘问题：</strong>ZUNIONSTORE 合并 60 个桶的复杂度怎么估算？为什么要移除分数小于等于 0 的条目？Redis 缓存故障时走哪条路径？</p>`}
],tasks:["画出互动写入分钟桶、查询合并窗口的流程","整理热度权重和负分规则","解释 windowEnd + offset cursor","分析 60 分钟窗口的性能和准确性"],quiz:[
{q:"点赞、收藏、评论权重分别是多少？",hint:"点赞 3，收藏 4，评论 5。"},
{q:"分钟桶 TTL 是多少？",hint:"2 小时。"},
{q:"窗口 key TTL 是多少？",hint:"2 分钟。"},
{q:"Hot cursor 保存什么？",hint:"windowEnd 和 offset。"}
]},
{day:8,title:"互动 Redis 快速状态与 MQ 异步落库",goal:"理解点赞收藏如何快速返回、异步写 MySQL、更新热榜。",focus:["SetActionState","Redis Watch","counter shard","RabbitMQ ActionChangedEvent","同步兜底"],sources:["apps/api/internal/application/interaction/service.go","apps/api/internal/infra/cache/feed_cache.go:SetActionState","apps/api/internal/application/interaction/worker.go","apps/api/internal/infra/mq/rabbitmq.go"],topics:[
{q:"点赞收藏为什么走 Redis 快速状态？",lv1:`<p>互动接口需要快速返回最新状态和计数。Service 先读取 MySQL 初始计数，再用 Redis 写用户行为状态和实时计数，随后投递 MQ 给 Worker 异步落库。</p>`,lv2:`<p><code class="inline">setActionAsync</code> 调用 <code class="inline">SetActionState</code>，Redis 使用 Watch + TxPipelined 保证行为状态和计数变更一致。Delta 为 0 时表示重复请求或状态相同。</p>`,lv3:`<p><strong>面试表达：</strong>Redis 承接在线读写体验，RabbitMQ 承接最终持久化；MQ 投递失败时回落到同步 SetAction，保证核心数据仍可写入。</p>`},
{q:"计数分片有什么意义？",lv1:`<p>同一个视频的点赞收藏可能有大量并发写。项目把实时计数增量按用户分散到 16 个 shard hash，读取时汇总 base 和 shard delta。</p>`,lv2:`<p>关键常量 <code class="inline">actionStatCounterShardCount = 16</code>。<code class="inline">actionStat</code> 读取 base、JSON fallback 和 shard deltas，最后用 clamp 保护计数。</p>`,lv3:`<p><strong>复盘问题：</strong>Redis Watch 冲突会怎样？幂等键命中时 delta 如何处理？为什么 JSON stat TTL 只有 15 秒？</p>`}
],tasks:["画出 Like API -> Redis -> MQ -> Worker -> MySQL 链路","解释 action state、base counter、shard counter、stat JSON 四类 key","整理 MQ 失败同步兜底路径","准备一段 Redis Watch 面试回答"],quiz:[
{q:"ActionChangedEvent 写入哪里？",hint:"RabbitMQ，Worker 消费后写 MySQL。"},
{q:"actionStatCounterShardCount 是多少？",hint:"16。"},
{q:"Idempotency-Key 命中时 delta 怎么样？",hint:"delta 为 0。"},
{q:"MQ 投递失败后怎么处理？",hint:"回落到同步仓储写入。"}
]},
{day:9,title:"评论、权限与游标分页",goal:"理解评论创建、删除、权限判断、计数更新和评论游标。",focus:["CreateComment","DeleteComment","评论权限","comment cursor","热度增量"],sources:["apps/api/internal/application/interaction/service.go","apps/api/internal/domain/interaction/entity.go","apps/api/internal/infra/persistence/interaction/gorm.go","apps/api/internal/interfaces/http/interaction/handler.go"],topics:[
{q:"评论创建和点赞收藏有什么差异？",lv1:`<p>评论创建直接走仓储事务，支持幂等键命中返回已有评论。评论创建后更新 comment_count，并按评论权重写热度。</p>`,lv2:`<p><code class="inline">CreateComment</code> 先根据 userID + idempotencyKey 查已有评论，再创建领域 Comment，调用 repo.CreateComment，返回评论和评论数。</p>`,lv3:`<p><strong>面试表达：</strong>评论属于内容实体，需要保存文本、作者、状态和时间，适合事务写入；点赞收藏更适合状态变更和快速计数。</p>`},
{q:"删除评论的权限怎么讲？",lv1:`<p>评论作者、视频作者、运营角色拥有不同删除权限。删除采用状态变更，并返回删除后的 comment_count。</p>`,lv2:`<p><code class="inline">DeleteComment</code> 调用仓储，由仓储确认评论存在、用户身份、视频归属和角色。删除成功后用 delta 写入热度变化。</p>`,lv3:`<p><strong>复盘问题：</strong>评论列表为什么用 created_at + comment_id 游标？评论删除如何影响热榜？运营角色如何扩展到审核后台？</p>`}
],tasks:["画出评论创建事务链路","整理评论删除权限矩阵","手写评论分页 cursor 内容","解释评论对热榜的正负增量"],quiz:[
{q:"评论默认 limit 是多少？",hint:"20。"},
{q:"评论 cursor 保存哪些字段？",hint:"created_at 和 comment_id。"},
{q:"谁可以删除评论？",hint:"评论作者、视频作者、运营角色。"},
{q:"评论热度权重是多少？",hint:"5。"}
]},
{day:10,title:"关注关系与 Following Feed",goal:"掌握关注关系、回填、普通作者推送、大 V 拉取和 Redis 索引合并。",focus:["relation service","FollowFeedBackfiller","FanoutWorker","inbox/outbox","BigCreatorFollowerThreshold"],sources:["apps/api/internal/application/relation/service.go","apps/api/internal/interfaces/http/router/router.go:FollowFeedBackfiller","apps/api/internal/application/video/fanout_worker.go","apps/api/internal/infra/cache/feed_cache.go:ListFollowingIndexPage"],topics:[
{q:"关注流推拉结合怎么实现？",lv1:`<p>普通作者发布后推入粉丝 inbox，大 V 发布后写作者 outbox。用户刷 following 时读取自己的 inbox 和关注大 V 的 outbox，排序去重后返回。</p>`,lv2:`<p>FanoutWorker 收到 PublishedEvent 后先预热视频卡片，再统计粉丝数。粉丝数达到 <code class="inline">BigCreatorFollowerThreshold = 10000</code> 时写 outbox；普通作者按批次写 inbox。</p>`,lv3:`<p><strong>面试表达：</strong>推拉结合平衡写放大和读放大。普通作者用推模型保证读取快，大 V 用拉模型控制发布瞬间写入压力。</p>`},
{q:"FollowFeedBackfiller 有什么作用？",lv1:`<p>用户新关注一个作者时，可以把作者近期视频回填到该用户 inbox，让关注后马上看到近期内容。</p>`,lv2:`<p>router.Register 中 relationOptions 注入 <code class="inline">WithFollowFeedBackfiller</code>。Backfiller 通过 feedRepo 查作者近期视频，通过 feedCache.AddInboxItems 写入当前用户收件箱。</p>`,lv3:`<p><strong>复盘问题：</strong>取关后 inbox 如何处理？Redis 索引为空时为什么回退 MySQL？outbox 和 inbox 的 maxLen 分别是多少？</p>`}
],tasks:["画出关注后回填链路","画出发布后 FanoutWorker 推拉判断链路","解释 inbox 与 outbox member 格式","分析 following index 为空时的 MySQL fallback"],quiz:[
{q:"大 V 阈值是多少？",hint:"10000 粉丝。"},
{q:"FanoutWorker 默认 follower batch size 是多少？",hint:"500。"},
{q:"inbox 默认 maxLen 是多少？",hint:"1000。"},
{q:"outbox 默认 maxLen 是多少？",hint:"500。"}
]},
{day:11,title:"推荐候选、排序与打散",goal:"理解 recommendation-candidates 的候选池、向量相似度、热度新鲜度和作者打散。",focus:["Candidate pool","rankScore","cosine similarity","freshness","interleaveByAuthor"],sources:["apps/api/internal/application/recommendation/service.go","apps/api/internal/domain/recommendation","apps/api/internal/infra/persistence/recommendation/gorm.go","docs/modules/recommendation.md"],topics:[
{q:"推荐候选链路怎么讲？",lv1:`<p>推荐服务先取候选池，再加载视频向量和用户兴趣向量，计算相似度、新鲜度、热度，形成 rank_score，最后排序和打散。</p>`,lv2:`<p>候选池大小由 limit 推导：limit × 8，最小 50，最大 500。<code class="inline">rankScore</code> 在有用户向量时用相似度 70%、热度 20%、新鲜度 10%；无用户向量时用热度 65%、新鲜度 35%。</p>`,lv3:`<p><strong>面试表达：</strong>这是一个教学版推荐系统，重点展示召回、排序、打散、游标和曝光去重的基本闭环。模型复杂度适中，方便后续替换成真实推荐服务。</p>`},
{q:"为什么需要作者打散？",lv1:`<p>排序后可能连续出现同一个作者的视频。打散能提升信息流多样性，让用户看到更多作者和内容类型。</p>`,lv2:`<p><code class="inline">interleaveByAuthor</code> 会在排序后重新排列候选，避免同一作者连续占据过多位置。游标仍基于 rank_score、published_at、video_id。</p>`,lv3:`<p><strong>复盘问题：</strong>打散会不会改变严格排序？如何平衡相关性和多样性？推荐 cursor 为什么比 timeline cursor 多 rank_score？</p>`}
],tasks:["整理 candidatePoolLimit 的公式和边界","解释 rankScore 两套权重","画出 RecommendStrategy 调用 recommendationService 的链路","准备推荐服务面试回答"],quiz:[
{q:"候选池 multiplier 是多少？",hint:"8。"},
{q:"候选池最小和最大是多少？",hint:"最小 50，最大 500。"},
{q:"有用户向量时相似度权重是多少？",hint:"0.70。"},
{q:"推荐 cursor 保存哪些字段？",hint:"rank_score、published_at、video_id。"}
]},
{day:12,title:"曝光上报、去重与兴趣反馈",goal:"理解曝光事件如何写入、聚合、去重并驱动推荐反馈。",focus:["video-view-events","exposures","exposure decisions","request_id","ViewEventPublisher"],sources:["apps/api/internal/application/exposure/service.go","apps/api/internal/infra/persistence/exposure/gorm.go","apps/api/internal/application/recommendation/service.go:DecideExposures","apps/api/internal/application/embedding/worker.go"],topics:[
{q:"曝光上报链路怎么走？",lv1:`<p>客户端在 Feed 展示和播放时上报 video-view-events。服务写入行为流水，并在 exposed 事件时维护 exposures 聚合索引。</p>`,lv2:`<p><code class="inline">RecordViewEvent</code> 创建 ViewEvent，调用仓储 SaveViewEvent，返回事件和曝光聚合，再发布 ViewEventRecordedEvent 给后续兴趣画像 Worker。</p>`,lv3:`<p><strong>面试表达：</strong>曝光是推荐系统的反馈闭环。它能避免短时间重复曝光，也能作为用户兴趣向量更新的行为信号。</p>`},
{q:"曝光去重如何服务推荐？",lv1:`<p>推荐接口可以对候选视频做近期曝光校验，近期看过的视频返回 allow=false 和 recently_exposed 原因。</p>`,lv2:`<p><code class="inline">DecideExposures</code> 查 <code class="inline">RecentExposureWindow</code> 内的曝光记录，按 videoID 生成 allow/fresh 或 deny/recently_exposed 决策。</p>`,lv3:`<p><strong>复盘问题：</strong>request_id 有什么价值？曝光流水和聚合索引分别服务什么？完播、跳过、播放时长如何影响兴趣画像？</p>`}
],tasks:["画出 view event -> exposure -> recommendation decision 的链路","整理 exposed/play/complete/skip 四类事件","解释 request_id 的追踪价值","准备曝光去重面试回答"],quiz:[
{q:"曝光上报接口是什么？",hint:"POST /api/video-view-events。"},
{q:"曝光聚合表记录哪些核心信息？",hint:"首次曝光、最近曝光、次数、最近 scene。"},
{q:"推荐曝光决策接口是什么？",hint:"POST /internal/exposure-decisions。"},
{q:"ViewEventPublisher 触发什么后续能力？",hint:"行为事件发布，供画像或 embedding worker 消费。"}
]},
{day:13,title:"Embedding 与兴趣向量",goal:"理解发布事件如何生成视频向量，推荐如何使用视频向量与用户兴趣向量。",focus:["HashNgramVectorizer","VideoEmbeddingWorker","CosineSimilarity","UserInterestVector"],sources:["apps/api/internal/application/embedding/service.go","apps/api/internal/application/embedding/worker.go","apps/api/internal/domain/embedding/hash_ngram.go","apps/api/internal/application/recommendation/service.go:rankCandidates"],topics:[

function updateProgress(){const p=P(),el=document.getElementById('progressText');if(S.mode==='intro'){el.textContent='前言'}else if(S.mode==='learn'){let m=0,t=0;learnData.forEach((c,ci)=>c.quiz.forEach((_,qi)=>{t++;if(p[`l_${ci}_${qi}`]==='mastered')m++}));el.textContent=`${m}/${t} 已掌握`}else if(S.mode==='breakdown'){let m=0;studyDays.forEach((_,i)=>{if(p[`d_${i}`]==='done')m++});el.textContent=`${m}/${studyDays.length} 天完成`}else if(S.mode==='interview'){let m=0,t=0;interviewData.forEach((d,di)=>d.questions.forEach((_,qi)=>{t++;if(p[`i_${di}_${qi}`])m++}));el.textContent=`${m}/${t} 已练习`}else{el.textContent='场景还原'}}

  app.innerHTML=sb+mn;

    let ticking=false;
    main.addEventListener('scroll',()=>{
      if(ticking)return;
      ticking=true;
      requestAnimationFrame(()=>{syncIntroActive();ticking=false});
    },{passive:true});
    if(S.sec>0)requestAnimationFrame(()=>goIntro(S.sec));
    else syncIntroActive();
  }
}

function syncIntroActive(){
  if(S.mode!=='intro')return;
  const main=document.querySelector('.main');
  if(!main)return;
  const sections=[...main.querySelectorAll('.md-section[id^="intro-sec-"]')];
  if(!sections.length)return;
  const mainTop=main.getBoundingClientRect().top;
  let active=0,best=Infinity;
  sections.forEach((el,idx)=>{
    const delta=Math.abs(el.getBoundingClientRect().top-mainTop-28);
    if(delta<best){best=delta;active=idx}
  });
  S.sec=active;
  document.querySelectorAll('.sidebar .side-item').forEach((el,idx)=>el.classList.toggle('active',idx===active));
  sections.forEach((el,idx)=>el.classList.toggle('active',idx===active));
}

function goIntro(i){
  S.sec=i;
  document.querySelectorAll('.sidebar .side-item').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  document.querySelectorAll('[id^="intro-sec-"]').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  const main=document.querySelector('.main');
  const el=document.getElementById(`intro-sec-${i}`);
  if(main&&el){
    const next=main.scrollTop+el.getBoundingClientRect().top-main.getBoundingClientRect().top-18;
    main.scrollTo({top:Math.max(0,next),behavior:'smooth'});
  }
}

    mn+=`<div class="content-header"><h1>故障排查场景</h1><div class="subtitle">训练 Redis、MQ、推荐退化下的回答</div></div><div class="grid">`;
    scenarioData.fault.forEach(sc=>{
      mn+=`<div class="panel"><h3>${sc.title}</h3><p>${sc.desc}</p>${sc.impacts.map(im=>`<div class="score-card" style="margin-top:10px"><strong>${im.what}</strong><p>${im.detail}</p><p>${im.fix}</p></div>`).join('')}</div>`;
    });
    mn+='</div>';
  }
  mn+='</div>';app.innerHTML=sb+mn;
}

function renderSearch(app){
  const q=S.q,res=[];
  introData.pillars.forEach((p,i)=>{const txt=p.title+p.text;if(txt.toLowerCase().includes(q))res.push({m:'intro',sec:i,title:`前言 > ${p.title}`,snip:p.text})});
  learnData.forEach((c,ci)=>{c.topics.forEach((t,ti)=>{const txt=t.q+t.lv1+t.lv2+t.lv3;if(txt.toLowerCase().includes(q))res.push({m:'learn',day:ci,sec:0,topic:ti,title:`知识学习 > ${c.title} > ${t.q}`,snip:strip(t.lv1).substring(0,120)})});c.quiz.forEach((z,qi)=>{if((z.q+z.hint).toLowerCase().includes(q))res.push({m:'learn',day:ci,sec:1,title:`知识学习 > ${c.title} > 自检题 ${qi+1}`,snip:z.q})})});
  studyDays.forEach((d,di)=>{const dayTxt=d.title+d.goal+d.focus.join(' ')+d.sources.join(' ')+d.tasks.join(' ');if(dayTxt.toLowerCase().includes(q))res.push({m:'breakdown',day:di,sec:0,title:`项目拆解 > Day ${d.day}：${d.title}`,snip:d.goal});d.topics.forEach((t,ti)=>{const txt=t.q+t.lv1+t.lv2+t.lv3;if(txt.toLowerCase().includes(q))res.push({m:'breakdown',day:di,sec:1,topic:ti,title:`项目拆解 > Day ${d.day} > ${t.q}`,snip:strip(t.lv1).substring(0,120)})});d.quiz.forEach((z,qi)=>{if((z.q+z.hint).toLowerCase().includes(q))res.push({m:'breakdown',day:di,sec:2,title:`项目拆解 > Day ${d.day} > 自检题 ${qi+1}`,snip:z.q})})});
  interviewData.forEach((d,di)=>d.questions.forEach((qu,qi)=>{if((qu.q+qu.a+(qu.follow||'')).toLowerCase().includes(q))res.push({m:'interview',dim:di,title:`面试问答 > ${d.dim} > Q${qi+1}`,snip:qu.q})}));
  appendixData.forEach(([k,v])=>{if((k+v).toLowerCase().includes(q))res.push({m:'interview',dim:interviewData.length-1,title:`高频速查 > ${k}`,snip:v})});
  scenarioData.e2e.forEach((sc,i)=>{if((sc.title+sc.desc).toLowerCase().includes(q))res.push({m:'scenario',sec:0,title:`场景还原 > ${sc.title}`,snip:sc.desc})});
  scenarioData.fault.forEach((sc,i)=>{if((sc.title+sc.desc).toLowerCase().includes(q))res.push({m:'scenario',sec:1,title:`场景还原 > ${sc.title}`,snip:sc.desc})});
  let h='<div class="sidebar"><div class="side-title">搜索</div><div class="side-item active"><span class="side-main">搜索结果</span><span class="badge">'+res.length+'</span></div></div><div class="main search-results">';
  h+=`<div class="content-header"><h1>搜索结果</h1><div class="subtitle">"${S.q}"，找到 ${res.length} 条匹配</div></div>`;
  if(!res.length)h+='<p style="color:var(--fg3);text-align:center;padding:40px">换个关键词再试。</p>';
  res.forEach(r=>{h+=`<div class="search-result" onclick='jump(${JSON.stringify(r).replace(/'/g,"\\'")})'><div class="sr-mode">${r.m==='intro'?'前言':r.m==='learn'?'知识学习':r.m==='breakdown'?'项目拆解':r.m==='interview'?'面试模拟':'场景还原'}</div><div class="sr-title">${hl(r.title,S.q)}</div><div class="sr-snippet">${hl(r.snip,S.q)}</div></div>`});
  h+='</div>';app.innerHTML=h;
}
function jump(r){S.q='';document.getElementById('searchInput').value='';S.mode=r.m;if(r.m==='intro'){S.sec=r.sec||0}else if(r.m==='learn'||r.m==='breakdown'){S.day=r.day||0;S.sec=r.sec||0;S.topic=r.topic||0}else if(r.m==='interview'){S.dim=r.dim||0}else{S.sec=r.sec||0}document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===S.mode));render()}

setT(getT());render();
</script>
</body>
</html>
