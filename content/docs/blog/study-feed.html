{id:6,title:"第6章：架构工程实践",topics:[
{q:"分层架构中事务怎么管理？InTx 模式是什么？",
lv1:`<p>Service 层不直接访问 repo.db，事务通过 <code class="inline">Transaction</code> 方法获取 tx，再调用 repo 的 InTx 方法。</p><p>好处：事务控制权在 Service 层（决定哪些操作在同一个事务里），数据操作在 Repository 层（怎么操作数据），职责清晰。</p>`,
lv2:`<pre><code><span class="cm">// like_service.go:Like</span>
err := s.likeRepo.Transaction(ctx, <span class="kw">func</span>(tx *gorm.DB) error {
    <span class="cm">// 在事务内调用 InTx 方法</span>
    created, _ := s.likeRepo.LikeInTx(ctx, tx, like)
    <span class="kw">if</span> created {
        s.videoRepo.ChangeLikesCount(ctx, tx, videoID, <span class="num">1</span>)
        s.videoRepo.ChangePopularity(ctx, tx, videoID, <span class="num">1</span>)
    }
    <span class="kw">return</span> <span class="kw">nil</span>
})
<span class="cm">// like_repo.go:Transaction</span>
<span class="kw">func</span> (r *LikeRepository) Transaction(ctx, fn) error {
    <span class="kw">return</span> r.db.WithContext(ctx).Transaction(fn)
}
<span class="cm">// video_repo.go:ChangeLikesCount</span>
<span class="kw">func</span> (r *VideoRepository) ChangeLikesCount(ctx, tx, id, change) {
    db := tx
    <span class="kw">if</span> db == <span class="kw">nil</span> { db = r.db }  <span class="cm">// 非事务时降级</span>
    <span class="kw">return</span> db.Model(&amp;Video{}).UpdateColumn(...)
}</code></pre>`,
lv3:`<p><strong>Q: 如果不传 tx 会怎样？</strong></p><p>ChangeLikesCount 检测到 tx==nil，自动使用 r.db（非事务模式）。适合不需要事务的场景。</p><p><strong>Q: 嵌套事务？</strong></p><p>GORM 的 Transaction 方法支持嵌套（内部使用 SavePoint），但项目中没有嵌套场景。</p>`},
{q:"GREATEST 函数防负数是什么设计？还有哪些防御性编程？",
lv1:`<p><strong>并发取消赞</strong>可能导致点赞计数减成负数。GREATEST 函数兜底：</p><pre><code>UPDATE videos SET likes_count = GREATEST(likes_count + ?, 0) WHERE id = ?</code></pre><p>即使并发扣减导致负数，也会被修正为 0。</p>`,
lv2:`<p>实现在 video_repo.go:ChangeLikesCount 第 73 行：</p><pre><code>db.WithContext(ctx).Model(&amp;Video{}).
    Where(<span class="str">"id = ?"</span>, id).
    UpdateColumn(<span class="str">"likes_count"</span>,
        gorm.Expr(<span class="str">"GREATEST(likes_count + ?, 0)"</span>, change)).Error</code></pre><p><strong>其他防御措施</strong>：</p><ul><li>空指针检查：redis.go 中 <code class="inline">if c == nil || c.rdb == nil { return }</code></li><li>超时设置：Redis 操作 50ms 超时，避免阻塞请求</li><li>错误码判断：1062 唯一键冲突静默忽略</li></ul>`,
lv3:`<p><strong>Q: 为什么不用乐观锁（version 字段）？</strong></p><p>乐观锁适合"读-改-写"场景（余额扣减），需要先读 version 再 WHERE version=N。点赞只需要原子 +1/-1，GORM 的 UpdateColumn + GREATEST 更简单高效。</p>`},
{q:"WaitGroup + Mutex 并行查询是怎么用的？",
lv1:`<p>多个 video ID 需要查询 DB 时，串行查询太慢。用 WaitGroup + Mutex 实现并行查询：</p><ul><li><strong>WaitGroup</strong>：等待所有 goroutine 完成</li><li><strong>Mutex</strong>：保护共享 map 的并发写入</li></ul>`,
lv2:`<p>实现在 GetVideoByIDs 第 480 行：</p><pre><code><span class="kw">var</span> wg sync.WaitGroup
<span class="kw">var</span> mu sync.Mutex
<span class="kw">for</span> _, id := <span class="kw">range</span> missedL2 {
    wg.Add(<span class="num">1</span>)
    <span class="kw">go</span> <span class="kw">func</span>(videoID uint) {
        <span class="kw">defer</span> wg.Done()
        sfKey := fmt.Sprintf(<span class="str">"sf:entity:%d"</span>, videoID)
        v, _, _ := f.requestGroup.Do(sfKey, <span class="kw">func</span>() {
            <span class="kw">return</span> f.repo.GetByIDs(ctx, []<span class="fn">uint</span>{videoID})
        })
        <span class="kw">if</span> v != <span class="kw">nil</span> {
            mu.Lock()
            videoMap[id] = safeCopy
            mu.Unlock()
            <span class="cm">// 写回 L1 缓存</span>
            f.localcache.Set(cacheKey, safeCopy, <span class="num">5</span>*time.Second)
        }
    }(id)
}
wg.Wait()</code></pre>`,
lv3:`<p><strong>Q: sync.Map vs Mutex+Map？</strong></p><ul><li>sync.Map：适合读多写少、key 稳定的场景</li><li>Mutex+Map：适合写多、key 频繁变化的场景</li><li>本项目写入频率不高（每次请求最多写几个 key），Mutex 更简单</li></ul><p><strong>Q: errgroup vs WaitGroup？</strong></p><p>errgroup 自动收集第一个错误并取消其他 goroutine。本项目需要所有 ID 都查询（即使部分失败），所以用 WaitGroup 更合适。</p>`},
{q:"优雅停机怎么实现的？Worker 和 API 的停机流程有什么区别？",
lv1:`<p>优雅停机的核心：<strong>停止接收新请求 → 等待活跃请求完成 → 释放资源 → 退出</strong>。</p><p>不优雅的停机：直接 kill 进程，活跃请求中断，MQ 消息可能丢失。</p>`,
lv2:`<p><strong>API 进程</strong>（router.go:GracefulShutdown 第 220 行）：</p><pre><code><span class="kw">func</span> GracefulShutdown(srv *http.Server) {
    stop := <span class="kw">make</span>(<span class="kw">chan</span> os.Signal, <span class="num">1</span>)
    signal.Notify(stop, os.Interrupt, syscall.SIGTERM)
    &lt;-stop  <span class="cm">// 阻塞直到收到信号</span>
    log.Printf(<span class="str">"api server is shutting down..."</span>)
    ctx, cancel := context.WithTimeout(context.Background(), <span class="num">5</span>*time.Second)
    <span class="kw">defer</span> cancel()
    srv.Shutdown(ctx)  <span class="cm">// 等待活跃请求完成</span>
}</code></pre><p><strong>Worker 进程</strong>（cmd/worker/main.go 第 148 行）：</p><pre><code>ctx, stop := signal.NotifyContext(context.Background(), os.Interrupt, syscall.SIGTERM)
<span class="kw">defer</span> stop()
<span class="cm">// 4 个 Worker goroutine 共享 ctx</span>
<span class="kw">go</span> socialWorker.Run(ctx)
<span class="kw">go</span> likeWorker.Run(ctx)
<span class="cm">// ...</span>
err = &lt;-errCh  <span class="cm">// 等待第一个错误或 ctx 取消</span></code></pre><p><strong>区别</strong>：API 用 signal.Notify + Shutdown（HTTP 层面优雅停机），Worker 用 signal.NotifyContext（传播取消信号到所有 Worker goroutine）。</p>`,
lv3:`<p><strong>Q: K8s preStop hook？</strong></p><p>K8s 发送 SIGTERM 前先执行 preStop hook（如 sleep 10s），给负载均衡器时间摘除 Pod。配合 terminationGracePeriodSeconds（默认 30s）使用。</p><p><strong>Q: MQ 消费中的消息怎么处理？</strong></p><p>Worker 收到 SIGTERM 后，ctx 被取消，正在处理的消息完成后再退出。未 Ack 的消息会重新入队，由其他 Worker 处理。</p>`}
],quiz:[
{q:"为什么 Service 层不直接访问 repo.db？",hint:"保持分层清晰，事务通过 Transaction 方法获取 tx，调用 InTx 方法操作。"},
{q:"GREATEST 函数的作用是什么？",hint:"GREATEST(likes_count + ?, 0) 保证即使并发扣减导致负数，也会被修正为 0。"},
{q:"singleflight 和 sync.Once 的区别？",hint:"singleflight 按 key 去重，不同 key 并行执行。sync.Once 只执行一次，不管 key。"},
{q:"优雅停机的流程是什么？",hint:"signal.NotifyContext 监听 SIGTERM → srv.Shutdown 等待活跃请求完成（5s 超时）→ 退出。"},
{q:"Dockerfile 多阶段构建的好处？",hint:"最终镜像只有二进制+最小运行时（alpine），编译工具链不进入最终镜像，体积小安全性好。"}
]}
];

const interviewData=[{dim:"项目介绍话术",questions:[{q:"请介绍一下你的短视频 Feed 系统项目",a:"这是一个基于 Go + Gin + GORM + Redis + RabbitMQ 的短视频信息流后端系统。整体架构是 API + Worker 双进程模型，API 负责接收 HTTP 请求和返回结果，Worker 负责异步消费 MQ 消息做持久化。核心功能有五个：视频发布、点赞评论、关注关系、Feed 流浏览、热度排行。技术亮点方面：第一是三级缓存（L1 go-cache 5s + L2 Redis 1h + L3 MySQL），用 singleflight 防击穿；第二是 Outbox 模式保证写 DB 和发 MQ 的最终一致性；第三是冷热分离，ZSET 存最新 1000 条热数据，超出走 MySQL；第四是幂等消费，MySQL 1062 唯一键冲突静默忽略；第五是 MQ 降级，MQ 不可用时自动切同步 MySQL 事务。第六是推拉结合，普通用户（粉丝&lt;10000）发布时通过 FanoutMQ 推送到粉丝收件箱，大V不推送，读取时从发件箱拉取，k-way merge 归并排序，网络 RTT 恒定1-2次。",code:"cmd/main.go, cmd/worker/main.go, internal/feed/service.go, internal/worker/fanoutworker.go",follow:"项目规模？你负责哪些模块？遇到的最大挑战？如何保证高可用？"}]},{dim:"Redis",questions:[{q:"缓存穿透、击穿、雪崩分别是什么？你的项目怎么解决的？",a:"这三个是经典的缓存问题。缓存穿透是查根本不存在的数据，缓存和 DB 都没有。项目用 EMPTY_DB 短路标记：查完 DB 发现为空，也往缓存写一个特殊值，下次直接返回。缓存击穿是热点 key 过期，大量并发涌向 DB。项目用四重防护：singleflight 合并同进程请求、分布式锁跨实例保护、double-check 获锁后再查缓存、spin-wait 未获锁时短暂等待。缓存雪崩是大量 key 同时过期。项目用不同 TTL 错开：L1 5s、L2 1h、热度窗口 2h。",code:"internal/feed/service.go:GetVideoByIDs (singleflight), ListByFollowing (分布式锁+double-check+spin-wait), ListLatest (EMPTY_DB)",follow:"singleflight 和分布式锁区别？EMPTY_DB 数据后来创建了怎么办？雪崩除了随机 TTL 还有什么方案？"},{q:"Redis 分布式锁怎么实现的？为什么解锁要用 Lua？",a:"加锁用 SET key random_token NX PX ttl，NX 保证互斥，PX 防死锁，random_token 标识持有者。解锁必须用 Lua 脚本，因为要保证 GET + 比较 + DEL 三步原子执行。如果不原子，可能出现：我 GET 发现 token 是我的，准备 DEL，但在这之间锁过期了，别人拿到了锁，我把别人的锁删了。Lua 脚本先 GET 比较 token，一致才 DEL，不一致返回 0，整个过程原子。",code:"internal/middleware/redis/redis.go:Lock (第84行), UnLock (第110行), unlockScript (第99行)",follow:"Redis 主从切换锁丢失？锁续期问题？其他分布式锁方案？"},{q:"ZSET 在你项目中的四个应用场景？",a:"第一个是时间线，key feed:global_timeline，score 是视频创建时间毫秒时间戳。第二个是热度窗口，key hot:video:1m:YYYYMMDDHHmm，每分钟一个窗口，score 是互动量。第三个是合并热榜，ZUNIONSTORE 合并 60 个窗口。第四个是推拉结合的收件箱和发件箱，inbox:{userID} 存推送视频（cap 500），user_videos:{authorID} 存作者最近视频（cap 50），读取时 k-way merge 归并。",code:"outboxworker.go:StartConsumer, popularity_cache.go, feed/service.go:ListByPopularity, fanoutworker.go:process, feed/service.go:ListByFollowing",follow:"ZSET 时间复杂度？inbox cap？概率裁剪？"},{q:"三级缓存架构怎么设计的？为什么需要 L1？",a:"L1 是 go-cache 本地缓存存在进程内存，TTL 5 秒。L2 是 Redis 分布式缓存，TTL 1 小时。L3 是 MySQL 源数据。查询时先 L1 命中直接返回，没命中查 L2 命中写回 L1，L2 也没命中查 L3 异步回写 L2 同步写回 L1。需要 L1 是因为 Redis 虽然快但每次查询还有 0.5-1ms 网络往返，L1 在进程内存亚毫秒返回。对于热点数据如首页 Feed 流反复访问的视频详情，L1 能把 Redis QPS 压力降低 90%+。",code:"internal/feed/service.go:GetVideoByIDs (第408行), NewFeedService (go-cache 初始化)",follow:"L1 一致性？go-cache 过期清理？多实例 L1 同步？"},{q:"singleflight 和分布式锁分别在什么场景用？",a:"singleflight 是 Go 标准库提供的单进程去重，并发请求只有一个执行其他共享结果。分布式锁用 Redis SETNX 跨实例去重。项目中：singleflight 用于全局 key 如 video entity sf:entity:{id}，同一实例内多个 goroutine 只有一个查 DB。分布式锁用于用户维度 key 如 feed:listByFollowing:accountID=123，因为不同实例的请求可能同时缓存未命中。组合使用：singleflight 在前减少锁竞争，分布式锁在后跨实例保护。",code:"GetVideoByIDs 用 singleflight, ListByFollowing 用分布式锁",follow:"shared 返回值？锁持有者宕机？两种机制组合使用？"},{q:"Redis 和 MySQL 双写一致性怎么保证？",a:"采用最终一致性策略。视频详情：异步回写加 TTL 自然过期，MySQL 查询成功后 go func 异步写 Redis 1h TTL。热度缓存：事件驱动失效，点赞评论后主动 DEL 详情缓存再 ZINCRBY 更新分钟窗口。时间线：Outbox 模式，事务写 video+outbox 表，轮询器投递 MQ，消费者 ZADD 到 ZSET。总结：读路径靠缓存加 TTL 兜底，写路径靠主动失效加事件驱动更新。",code:"popularity_cache.go:UpdatePopularityCache, video_repo.go:PublishVideo, outboxworker.go",follow:"DEL 和更新 DB 之间有延迟？为什么不用 Canal？Cache Aside 模式？"},{q:"Lua 脚本在你项目中的两个用途？",a:"第一个是限流，Lua 把 INCR 和 PEXPIRE 合成原子操作。先 INCR key，如果 count 等于 1 就设置 PEXPIRE 过期时间，保证计数和过期设置原子。第二个是分布式锁解锁，Lua 把 GET+比较+DEL 合成原子操作。先 GET key 的值和传入 token 比较，一致才 DEL，不一致返回 0。Redis 单线程模型下 Lua 脚本内所有命令原子执行中间不会被其他命令插入。",code:"redis.go:incrementWithExpireScript (第48行), unlockScript (第99行)",follow:"Lua 会阻塞其他命令？执行时间过长？其他保证原子性方式？"},{q:"Redis 为什么这么快？",a:"三个原因：单线程事件循环避免锁竞争和上下文切换、内存存储纳秒级访问、IO 多路复用 epoll/kqueue 单线程处理万级连接。ZSET 底层用跳表加哈希表，跳表支持 O(log N) 范围查询。Redis 6.0 引入多线程 IO 但命令执行仍是单线程。",code:"internal/middleware/redis/目录",follow:"Redis 6.0 多线程 IO？单线程利用多核？Redis vs Memcached？"},{q:"Redis 持久化 RDB vs AOF？",a:"RDB 是快照恢复快但可能丢最后一次快照后的数据。AOF 是日志更安全但文件大恢复慢。本项目 ZSET 可以从 MySQL 重建，RDB 够用。如果 Redis 丢了数据，singleflight 触发从 MySQL 重建 ZSET。",code:"internal/feed/service.go:ListLatest (ZSET 为空时 singleflight 重建)",follow:"AOF 重写？混合持久化？RDB fork 影响性能？"},{q:"限流的 Lua 脚本为什么必须原子执行？",a:"防止 INCR 成功但 PEXPIRE 未执行导致 key 永不过期，该 IP 或用户被永久限流。Lua 在 Redis 单线程中原子执行保证这两个操作要么都成功要么都失败。",code:"redis.go:incrementWithExpireScript, ratelimit.go:Limit",follow:"key 被手动删了？固定窗口缺点？令牌桶 vs 漏桶？"}]},{dim:"消息队列",questions:[{q:"为什么要用消息队列？",a:"三个原因：解耦让 API 和持久化分离互不影响、异步让 API 快速返回不等 MQ 处理完、削峰让点赞突发流量被缓冲不至于压垮 DB。项目用 5 个 Topic Exchange 分别承载 like、comment、social、popularity、timeline 事件。",code:"likeMQ.go, socialMQ.go, likeworker.go",follow:"MQ 带来什么问题？什么场景不适合？RabbitMQ vs Kafka？"},{q:"如何保证消息不丢失？",a:"三层保障：Producer 端消息设为 Persistent delivery_mode=2 写入磁盘、Broker 端 durable exchange 加 durable queue 重启不丢失、Consumer 端手动 Ack/Nack 处理成功才 Ack 处理失败 Nack 重新入队。",code:"likeworker.go:Run (manual Ack), rabbitmq.go (durable exchange+queue)",follow:"Nack 一直重试？镜像队列？持久化性能影响？"},{q:"如何保证消息不重复消费？",a:"幂等消费用数据库唯一索引。LikeIgnoreDuplicate 插入点赞记录遇到 1062 唯一键冲突直接返回 created=false 静默忽略。Worker 消费时 created=true 才更新计数和热度，created=false 跳过。At-least-once 加幂等消费等于效果上 Exactly-once。",code:"likeworker.go:applyLike, like_repo.go:LikeIgnoreDuplicate (第31行)",follow:"不适合加唯一索引？其他幂等方式？消息体带唯一 ID？"},{q:"什么是 Outbox 模式？",a:"解决写 DB 和发 MQ 不能原子的问题。事务写 video+outbox 表（含 AuthorID），轮询器每秒扫描 pending 记录双投递：先投递 TimelineMQ（写全局时间线），成功后投递 FanoutMQ（推送到粉丝收件箱），两者都成功才删除 outbox 记录。",code:"video_repo.go:PublishVideo, outboxworker.go:StartOutboxPoller (双投递), fanoutMQ.go",follow:"轮询延迟控制？vs CDC Debezium？双投递顺序？"},{q:"MQ 不可用时系统怎么降级？",a:"MQ 优先加同步降级。LikeMQ 失败时降级到同步 MySQL 事务执行 LikeInTx 加 ChangeLikesCount 加 ChangePopularity。PopularityMQ 失败时直接调用 UpdatePopularityCache 更新 Redis。核心数据不丢只是 API 变慢。",code:"like_service.go:Like (likeMQSent/popularityMQSent 标记)",follow:"降级后性能影响？MySQL 也挂了？监控 MQ 可用性？"},{q:"RabbitMQ Exchange 类型有哪些？",a:"Direct 精确匹配 routing key、Fanout 广播到所有绑定队列、Topic 通配符匹配星号匹配一个词井号匹配零或多词本项目用的、Headers 很少用按消息头匹配。",code:"likeMQ.go, socialMQ.go (Topic Exchange 声明)",follow:"Topic vs Direct 性能？绑定很多队列？死信队列？"},{q:"At-least-once vs At-most-once vs Exactly-once？",a:"At-most-once 可能丢消息性能最好。At-least-once 不丢但可能重复本项目用的。Exactly-once 不丢不重实现极难。用 At-least-once 加幂等消费达到效果上 Exactly-once。",code:"likeworker.go:Run+applyLike",follow:"Kafka Exactly-once？幂等 Producer？事务消息？"},{q:"Outbox 轮询 vs CDC？",a:"轮询简单无额外依赖有延迟当前 1 秒。CDC 如 Debezium 延迟低毫秒级但需要额外部署增加运维复杂度。本项目每秒轮询 1 秒延迟可接受。",code:"outboxworker.go:StartOutboxPoller",follow:"Outbox 表膨胀？Debezium 影响 MySQL 性能？其他 CDC 工具？"}]},{dim:"Feed 流设计",questions:[{q:"推拉结合怎么实现的？",a:"普通用户（粉丝&lt;10000）发布时 FanoutMQ 推送到粉丝 inbox ZSET，大V（>=10000）不推送。FanoutWorker 写 user_videos 发件箱后判断粉丝数，普通用户 Pipeline 批量写 inbox（1%概率裁剪）。读取时并行读 inbox+bigV 列表，提前终止判断，Pipeline 批量拉取，k-way merge 归并。RTT 恒定1-2次。",code:"fanoutworker.go:process, feed/service.go:ListByFollowing, socialworker.go:onFollow",follow:"大V阈值？取关后inbox清理？k-way merge复杂度？"},{q:"冷热分离怎么做的？",a:"ZSET 保留最新 1000 条视频最老的 score 作为 watermark。reqTime 大于 watermark 走 Redis 热查询用 ZREVRANGEBYSCORE 分页。reqTime 小于等于 watermark 走 MySQL 冷查询。热数据不足时补冷尾用最后一条的 create_time 作为冷查询起点。冷数据不回写 ZSET 防污染热点。",code:"feed/service.go:ListLatest (第41行), outboxworker.go:StartConsumer (ZADD+裁剪)",follow:"watermark 变化？1000 条够吗？冷数据回写问题？"},{q:"游标分页 vs offset 分页？",a:"offset 大偏移 O(N) 需要扫描前 N 条再跳过且数据变化导致错位。游标 O(log N+limit) 利用索引直接定位且稳定。项目三种游标：时间游标 create_time、双字段 likes_count 加 id 解决并列、三字段 popularity 加 create_time 加 id。",code:"ListLatest, ListLikesCount, ListByPopularity",follow:"游标缺点？为什么需要多字段？跳到第 N 页？"},{q:"热度排行怎么实现的？",a:"实时更新用 ZINCRBY 更新分钟窗口 hot:video:1m:。查询合并用 ZUNIONSTORE 合并过去 60 个窗口 score 求和。稳定分页用 as_of 加 offset 保证同一批次基于同一快照。降级方案 MySQL 三字段游标。",code:"popularity_cache.go, feed/service.go:ListByPopularity (第305行)",follow:"为什么 60 个窗口？ZUNIONSTORE 时间复杂度？热度衰减？"},{q:"三字段游标怎么处理并列？",a:"popularity 加 create_time 加 id 三重排序。WHERE 条件用 OR 连接三种情况：popularity 小于、popularity 相等且 create_time 小于、popularity 相等且 create_time 相等且 id 小于。id 自增保证唯一做最终 tiebreaker。",code:"feed/repo.go:ListByPopularity",follow:"不用 id 做第三字段？WHERE 条件能用索引？四字段游标？"},{q:"为什么冷数据不回写 ZSET？",a:"防污染热点时间线 ZSET 只保留最新 1000 条。冷数据流量极小 MySQL 索引够用。如果回写会导致 ZSET 膨胀失去热缓存意义。",code:"feed/service.go:ListLatest 第110行注释",follow:"频繁翻到冷数据？冷数据单独建 ZSET？监控冷热比例？"},{q:"SoftJWTAuth 的设计思路？",a:"公共接口可选认证。有 token 时解析身份写入 context 获取 accountID 用于查 is_liked。没有 token 也放行 accountID 设为 0 is_liked 全 false。token 格式错误才拦截 401。",code:"jwt.go:SoftJWTAuth (第92行), router.go (feedGroup), feed/service.go:buildFeedVideos",follow:"token 无效时处理？按什么 key 限流？其他 SoftJWTAuth 场景？"},{q:"如何支持亿级用户？",a:"MySQL 分库分表加 Redis Cluster 加 API 水平扩容加 RabbitMQ 集群或换 Kafka 加 CDN 视频。已实现推拉结合，可通过调整大V阈值优化 fanout 范围。Worker 独立扩缩容。",code:"cmd/main.go, cmd/worker/main.go",follow:"分库后全局唯一 ID？跨分片查询？Redis Cluster 数据迁移？"},
{q:"推拉结合的读取路径怎么优化的？",a:"五个优化：并行读取（inbox+bigV goroutine 并行，2RTT→1RTT）、提前终止（inbox够用且大V无新内容时跳过拉取）、Pipeline批量（N个大V查询合并为1次RTT）、动态拉取数量（按需取，减少传输）、恒定RTT（不随大V数量增长）。",code:"feed/service.go:ListByFollowing",follow:"提前终止采样策略？Pipeline失败降级？inbox为空？"},
{q:"k-way merge 怎么实现的？",a:"用 container/heap 实现最大堆。把 inbox 推路径和每个大V拉路径的所有元素放入堆，每次弹出 createTime 最大的，检查 videoID 去重，取 top N。O(N log K) 时间复杂度。",code:"feed/service.go:mergeAndDedup, videoTimeHeap",follow:"最大堆还是最小堆？去重数据结构？大V发件箱为空？"}]},{dim:"系统设计",questions:[{q:"设计一个短视频信息流系统",a:"上传走 OSS。发布用 Outbox 模式双投递 TimelineMQ+FanoutMQ，FanoutWorker 写发件箱+推inbox。浏览用推拉结合加冷热分离加三级缓存。互动用 MQ 优先加同步降级加幂等消费。认证用 JWT 加 Redis 吊销。限流用 Lua 脚本固定窗口。",code:"cmd/main.go, router.go, feed/service.go, fanoutworker.go, like_service.go",follow:"视频转码？推荐算法？内容审核？"},{q:"点赞数实时更新如何设计？",a:"API 投递两条 MQ：LikeMQ 负责点赞记录、PopularityMQ 负责热度更新。Worker 消费后 MySQL 原子更新用 GREATEST 防负数加 Redis 热度更新 ZINCRBY。MQ 失败降级同步事务。幂等消费用唯一索引 1062。",code:"like_service.go:Like, likeworker.go:applyLike, video_repo.go:ChangeLikesCount",follow:"为什么用 MQ？GREATEST 防什么？并发更新精度？"},{q:"如何处理热门视频的流量突增？",a:"限流 KeyByAccount 30 次每分钟防恶意刷赞。singleflight 合并并发请求。L1 本地缓存 5s 减少 Redis 压力。降级 Redis 挂了走 MySQL。四重防护防缓存击穿。",code:"router.go (likeLimiter), GetVideoByIDs, like_service.go",follow:"限流触发后用户体验？singleflight 超时？MySQL 也扛不住？"},{q:"如果流量增大 10 倍？",a:"API 水平扩容加 Nginx 负载均衡。Redis Cluster 分片。MySQL 读写分离或分库分表。RabbitMQ 集群或换 Kafka。CDN 加速视频。推拉结合替代纯拉模型。Worker 独立扩缩容。",code:"",follow:"灰度发布？分库中间件？容量评估？"},{q:"CAP 理论？你的系统偏向哪个？",a:"偏向 AP 最终一致性加高可用。Redis 缓存短暂不一致最多延迟 5 秒。Outbox 秒级延迟保证最终一致。MQ 降级保可用。GREATEST 容忍不一致。核心设计：可用性优先一致性兜底。",code:"like_service.go, video_repo.go:PublishVideo",follow:"什么场景用 CP？Raft vs Paxos？监控一致性延迟？"},{q:"分布式 ID 生成方案？",a:"当前 randToken random hex 无序。建议 Snowflake 时间有序 64 位或 UUID v7 或 Leaf 号段模式。Snowflake 结构：1 位符号+41 位时间戳+10 位机器+12 位序列号。",code:"redis.go:randToken (第76行)",follow:"Snowflake 时钟回拨？ID 长度对索引影响？自增 ID 分布式问题？"}]},{dim:"Go 语言与工程",questions:[{q:"singleflight 的原理？",a:"内部维护一个 map，key 对应一个 call 结构体。相同 key 并发请求只有一个执行函数，其他等待并共享结果。shared=true 表示搭便车。执行完成后所有等待者同时收到结果。",code:"GetVideoByIDs, ListLatest",follow:"map 内存泄漏？vs errgroup？panic 了怎么办？"},{q:"Go 中 context 的作用？",a:"三个作用：取消传播父 context 取消子 context 自动取消、超时控制 WithTimeout 自动取消、值传递 WithValue 传递请求级数据。Redis 操作用独立 context 50ms 超时不依赖请求 context 避免被取消。",code:"popularity_cache.go (独立 context 50ms), GracefulShutdown",follow:"context.WithValue 的 key 类型？内存泄漏？context.AfterFunc？"},{q:"WaitGroup 和 Mutex 的使用场景？",a:"WaitGroup 等待 goroutine 完成用于并行扇出查询。Mutex 保护共享资源如 videoMap 并发写入。本项目 GetVideoByIDs 用 WaitGroup 等待所有查询 goroutine 完成用 Mutex 保护 videoMap 写入。",code:"GetVideoByIDs (第480行)",follow:"WaitGroup vs channel？sync.Map？RWMutex？"},{q:"Gin 中间件执行顺序？",a:"按注册顺序执行。c.Next() 传递到下一个中间件。c.Abort() 终止链路。限流超限 AbortWithStatusJSON 429。JWT 认证失败 Abort 401。SoftJWTAuth 无 token 时 Next 放行。",code:"ratelimit.go:Limit, jwt.go:JWTAuth, router.go",follow:"c.Next() 和 c.Set() 顺序？后置逻辑？路由树组织？"},{q:"GORM 事务使用方式？",a:"db.Transaction(func(tx)error{}) 自动 commit/rollback。Service 通过 repo.Transaction 获取 tx 调用 InTx 方法。ChangeLikesCount 接受 tx 参数非事务时传 nil 自动降级为 r.db。",code:"like_service.go, video_repo.go:ChangeLikesCount, PublishVideo",follow:"隔离级别？嵌套事务？大事务问题？"},{q:"Go 错误处理哲学？",a:"错误是值显式返回检查 err!=nil。errors.Is 判断错误类型。errors.As 提取特定错误类型。项目中 isDuplicateKey 用 errors.As 提取 mysql.MySQLError 判断 1062。",code:"like_service.go, like_repo.go:isDuplicateKey",follow:"error wrapping？panic vs error？自定义错误类型？"},{q:"优雅停机怎么实现？",a:"API 用 signal.Notify 监听 SIGTERM 加 http.Server.Shutdown 5 秒超时等待活跃请求完成。Worker 用 signal.NotifyContext 传播取消信号到所有 Worker goroutine 加 errCh 收集错误。",code:"router.go:GracefulShutdown, cmd/worker/main.go (signal.NotifyContext)",follow:"MQ 消费处理？K8s preStop？测试优雅停机？"},{q:"Dockerfile 多阶段构建的好处？",a:"编译阶段用 golang 镜像编译二进制。运行阶段用 alpine 最小镜像只复制二进制。好处：最终镜像小只有几十 MB、安全性好没有编译工具链、构建独立不依赖宿主机 Go 环境。api 和 worker 两个 target。",code:"backend_repeat/Dockerfile",follow:"scratch vs alpine？减小 Go 二进制体积？Docker 层缓存？"}]},{dim:"认证与安全",questions:[{q:"JWT 的组成？",a:"Header 包含算法 HS256 和类型 JWT。Payload 包含 account_id、username、exp 过期时间、iat 签发时间、nbf 生效时间。Signature 用 HMAC-SHA256 对 Header+Payload 签名防篡改。HS256 对称密钥 vs RS256 非对称密钥。",code:"auth/jwt.go:GenerateToken (第41行), ParseToken (第56行)",follow:"Payload 放敏感数据？过期时间设多长？JWT vs OAuth2？"},{q:"JWT vs Session？",a:"JWT 无状态水平扩展好但不能主动吊销。Session 有状态可主动失效但需要共享存储。本项目 JWT 加 Redis Token 存储实现吊销：登录时存 Redis 每次请求比对不一致即吊销。",code:"auth/jwt.go, jwt.go:check",follow:"JWT 续期？Refresh Token？分布式 Session？"},{q:"如何实现 JWT 吊销？",a:"Redis 存 token key 为 account:{id}。每次请求 check 函数先查 Redis 比对 token。不一致返回 401 token has been revoked。Redis 异常降级 MySQL 查 account 表的 token 字段。退出时删除 Redis key。",code:"jwt.go:check (第46行), account/service.go (Login 时存 Redis)",follow:"多设备登录？Token 黑白名单？踢掉其他设备？"},{q:"什么是 TOCTOU？",a:"Time-of-Check to Time-of-Use 检查到使用之间的竞态窗口。点赞不预检查依赖唯一索引消除窗口。关注保留预检查加 uniqueIndex 兜底属于用户体验优先给用户友好提示 already followed。",code:"like_service.go:Like, social/service.go:Follow",follow:"唯一索引 vs 乐观锁？其他防重方式？version 字段？"},{q:"bcrypt 的原理？",a:"基于 Blowfish 加密算法。自带随机 salt 防彩虹表。计算慢约 100ms 防暴力破解。可调 cost 参数默认 10 每增加 1 计算时间翻倍。MD5/SHA256 太快每秒数十亿次不适合密码。",code:"account/service.go",follow:"cost 参数选多大？argon2 vs bcrypt？SHA256+salt 为什么不行？"}]},{dim:"场景题与开放题",questions:[{q:"如果 Redis 挂了？",a:"缓存降级 L1 在加 L3 兜底直接查 MySQL。分布式锁失效 nil 返回放行所有请求直接穿透。限流失效 fail-open 放行。Token 吊销降级 MySQL 查询。核心功能可用但性能下降。",code:"redis.go (nil check), jwt.go:check (MySQL 降级), ratelimit.go",follow:"监控 Redis？集群单节点挂？Redis 高可用？"},{q:"如果 RabbitMQ 宕机？",a:"自动降级同步路径 likeMQSent=false 走同步 MySQL 事务。Outbox 轮询器持续重试 MQ 恢复后自动补发。影响 API 变慢但数据不丢。",code:"like_service.go:Like, outboxworker.go, cmd/main.go (rbq=nil)",follow:"监控 MQ？积压消息处理？消息乱序？"},{q:"限流算法的缺点？",a:"固定窗口临界问题窗口边界突发 2x 流量。改进：滑动窗口用 ZSET 存时间戳、滑动窗口计数器当前加上一窗口加权、令牌桶允许突发、漏桶平滑流量。",code:"ratelimit.go, redis.go:incrementWithExpireScript",follow:"令牌桶 vs 漏桶？分布式限流？拒绝状态码？"},{q:"如何监控系统健康？",a:"pprof 看 CPU 内存 goroutine。Redis Ping 检测连接。RabbitMQ 管理界面看队列积压。日志记录错误。进一步 Prometheus 加 Grafana 加 Jaeger 加告警。",code:"observability/pprof.go, cmd/main.go",follow:"pprof profile 类型？goroutine 泄漏？Prometheus 四种 Metric？"},{q:"如果重新设计，你会改什么？",a:"分布式 ID 用 Snowflake 替代 random hex。JWT 用 access 加 refresh token 分离。限流用滑动窗口替代固定窗口。CDC 用 Debezium 替代 Outbox 轮询。Redis Cluster 替代单机。加死信队列处理毒消息。",code:"redis.go:randToken, auth/jwt.go, ratelimit.go, outboxworker.go",follow:"改进优先级？线上改动保证？其他优化？"}]},{dim:"高频追问速查表",questions:[]}];

{what:"幂等消费",detail:"Worker LikeIgnoreDuplicate catch 1062",fix:"重复消息不影响最终结果"}
]},
{title:"优雅停机",desc:"进程收到 SIGTERM 信号",impacts:[
{what:"API 停机",detail:"signal.Notify → srv.Shutdown(5s 超时)",fix:"等待活跃请求完成再退出"},
{what:"Worker 停机",detail:"signal.NotifyContext → ctx 取消",fix:"4 个 Worker goroutine 感知取消信号"},
{what:"MQ 消息处理",detail:"未 Ack 的消息重新入队",fix:"其他 Worker 接手处理"},
{what:"Outbox 轮询",detail:"轮询 goroutine 随进程退出",fix:"下次启动时继续处理 pending 记录"}
]}
]};

/* ═══════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════ */
let S={mode:'learn',ch:0,sec:0,topic:0,dim:0,q:'',timer:null,secs:0,running:false};

const P=()=>{try{return JSON.parse(localStorage.getItem('sp')||'{}')}catch{return{}}};
const save=(p)=>localStorage.setItem('sp',JSON.stringify(p));
const getT=()=>localStorage.getItem('st')||'light';
const setT=(t)=>{localStorage.setItem('st',t);document.documentElement.setAttribute('data-theme',t);document.getElementById('themeIcon').textContent=t==='dark'?'☀':'☽'};

function toggleTheme(){setT(getT()==='light'?'dark':'light')}
function switchMode(m){
  S.mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  render();
}
function handleSearch(v){S.q=v.trim().toLowerCase();render()}
function hl(t,q){if(!q)return t;return t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>')}
function strip(h){const d=document.createElement('div');d.innerHTML=h;return d.textContent||''}

/* ═══════════ RENDER ═══════════ */
function render(){
  const app=document.getElementById('app');
  if(S.q){renderSearch(app);updateProg();return}
  if(S.mode==='learn')renderLearn(app);
  else if(S.mode==='interview')renderInterview(app);
  else renderScenario(app);
  updateProg();
}

function updateProg(){
  const p=P(),el=document.getElementById('progressText');
  if(S.mode==='learn'){
    let m=0,t=0;learnData.forEach((c,ci)=>c.quiz.forEach((_,qi)=>{t++;if(p[`l_${ci}_${qi}`]==='m')m++}));
    el.textContent=`${m}/${t} 已掌握`;
  }else if(S.mode==='interview'){
    let m=0,t=0;interviewData.forEach((d,di)=>d.questions.forEach((_,qi)=>{t++;if(p[`i_${di}_${qi}`])m++}));
    el.textContent=`${m}/${t} 已练习`;
  }else{
    el.textContent='场景还原';
  }
}

/* ═══════════ LEARN MODE ═══════════ */
function renderLearn(app){
  const ch=learnData[S.ch],p=P();
  let sb='<div class="sidebar">';
  learnData.forEach((c,ci)=>{
    const tot=c.quiz.length;let m=0;
    c.quiz.forEach((_,qi)=>{if(p[`l_${ci}_${qi}`]==='m')m++});
    const pct=tot?Math.round(m/tot*100):0;
    const isOpen=ci===S.ch;
    sb+=`<div class="ch-group"><div class="ch-header ${isOpen?'open active':''}" onclick="S.ch=${ci};S.topic=0;S.sec=0;render()">
      <span class="ch-arrow">▶</span><span class="ch-title">${c.title}</span><span class="ch-badge">${m}/${tot}</span></div>
      <div class="ch-bar"><div class="ch-bar-fill" style="width:${pct}%"></div></div>
      <div class="ch-subs ${isOpen?'open':''}">`;
    c.topics.forEach((t,ti)=>{
      sb+=`<div class="sub-item ${isOpen&&ti===S.topic&&S.sec>=0?'active':''}" onclick="event.stopPropagation();S.ch=${ci};S.topic=${ti};S.sec=0;render()">${t.q.length>20?t.q.substring(0,20)+'...':t.q}</div>`;
    });
    sb+=`<div class="sub-item ${isOpen&&S.sec===-1?'active':''}" onclick="event.stopPropagation();S.ch=${ci};S.sec=-1;render()">📝 自检题</div>`;
    sb+='</div></div>';
  });
  sb+='</div>';

  let mn='<div class="main">';
  if(S.sec>=0){
    const topic=ch.topics[S.topic];
    mn+=`<div class="content-header"><h1>${ch.title}</h1><div class="subtitle">${topic.q}</div></div>`;
    mn+=`<div class="section-card"><h2>${topic.q}</h2>`;
    mn+=`<div class="lv-block lv1"><div class="lv-header" onclick="toggleLv(this)"><span class="lv-arrow">▶</span><span class="lv-tag">Lv1 概念</span><span style="flex:1;margin-left:8px">是什么、为什么</span></div><div class="lv-body">${topic.lv1}</div></div>`;
    mn+=`<div class="lv-block lv2"><div class="lv-header" onclick="toggleLv(this)"><span class="lv-arrow">▶</span><span class="lv-tag">Lv2 实现</span><span style="flex:1;margin-left:8px">项目里怎么做的</span></div><div class="lv-body">${topic.lv2}</div></div>`;
    mn+=`<div class="lv-block lv3"><div class="lv-header" onclick="toggleLv(this)"><span class="lv-arrow">▶</span><span class="lv-tag">Lv3 推演</span><span style="flex:1;margin-left:8px">如果...会怎样</span></div><div class="lv-body">${topic.lv3}</div></div>`;
    mn+='</div>';
    mn+='<div class="nav-bar">';
    if(S.topic>0)mn+=`<button class="nav-btn" onclick="S.topic--;S.sec=0;render();scrollMain()"><span class="arrow-icon">←</span> 上一个知识点</button>`;
    else mn+='<div></div>';
    if(S.topic<ch.topics.length-1)mn+=`<button class="nav-btn primary" onclick="S.topic++;S.sec=0;render();scrollMain()">下一个知识点 <span class="arrow-icon">→</span></button>`;
    else mn+=`<button class="nav-btn primary" onclick="S.sec=-1;render();scrollMain()">查看自检题 <span class="arrow-icon">→</span></button>`;
    mn+='</div>';
  }else{
    mn+=`<div class="content-header"><h1>${ch.title}</h1><div class="subtitle">自检题 — 检验你的理解</div></div>`;
    mn+='<div class="quiz-section">';
    ch.quiz.forEach((q,qi)=>{
      const st=p[`l_${S.ch}_${qi}`];
      const badge=st==='m'?'<span class="quiz-status status-mastered">已掌握</span>':st==='u'?'<span class="quiz-status status-unmastered">未掌握</span>':'';
      mn+=`<div class="quiz-item" style="animation-delay:${qi*50}ms"><div class="quiz-q" onclick="toggleQuiz(this)">
        <span class="q-num">${qi+1}</span><span class="q-text">${q.q}</span>${badge}<span class="q-toggle">▶</span></div>
        <div class="quiz-body"><div class="quiz-hint">${q.hint}</div>
        <div class="quiz-btns"><button class="quiz-btn mastered" onclick="event.stopPropagation();markL(${S.ch},${qi},'m')">✓ 已掌握</button>
        <button class="quiz-btn unmastered" onclick="event.stopPropagation();markL(${S.ch},${qi},'u')">✗ 未掌握</button></div></div></div>`;
    });
    mn+='</div>';
    mn+='<div class="nav-bar">';
    mn+=`<button class="nav-btn" onclick="S.sec=0;S.topic=${ch.topics.length-1};render();scrollMain()"><span class="arrow-icon">←</span> 返回知识点</button>`;
    if(S.ch<learnData.length-1)mn+=`<button class="nav-btn primary" onclick="S.ch++;S.topic=0;S.sec=0;render();scrollMain()">下一章 <span class="arrow-icon">→</span></button>`;
    else mn+='<div></div>';
    mn+='</div>';
  }
  mn+='</div>';
  app.innerHTML=sb+mn;
}

function toggleLv(el){const body=el.nextElementSibling;body.classList.toggle('open');el.classList.toggle('open')}
function scrollMain(){const m=document.querySelector('.main');if(m)m.scrollTop=0}
function toggleQuiz(el){const body=el.nextElementSibling;const arrow=el.querySelector('.q-toggle');body.classList.toggle('open');arrow.classList.toggle('open')}
function markL(ci,qi,st){const p=P();p[`l_${ci}_${qi}`]=st;save(p);render()}

/* ═══════════ INTERVIEW MODE ═══════════ */
function renderInterview(app){
  const dim=interviewData[S.dim],p=P();
  let sb='<div class="sidebar">';
  interviewData.forEach((d,di)=>{
    const tot=d.questions.length;let m=0;
    d.questions.forEach((_,qi)=>{if(p[`i_${di}_${qi}`])m++});
    sb+=`<div class="dim-item ${di===S.dim?'active':''}" onclick="S.dim=${di};render()">
      <span>${d.dim}</span><span class="dim-badge">${m}/${tot}</span></div>`;
  });
  sb+='</div>';

  let mn='<div class="main">';
  if(dim.dim==='项目介绍话术'){
    const q=dim.questions[0];
    mn+=`<div class="content-header"><h1>${dim.dim}</h1></div>`;
    mn+=`<div class="intro-card"><h3>${q.q}</h3><p>${q.a}</p>`;
    if(q.code)mn+=`<span class="code-link">📎 ${q.code}</span>`;
    if(q.follow)mn+=`<div class="follow-tag">💡 追问方向：${q.follow}</div>`;
    mn+='</div>';
  }else if(S.dim===interviewData.length-1){
    mn+=`<div class="content-header"><h1>高频追问速查表</h1><div class="subtitle">面试中常见的追问，一句话速答</div></div>`;
    mn+='<div class="toolbar"><div class="search-wrap"><span class="search-icon">⌕</span><input type="text" class="search-box" placeholder="搜索追问..." oninput="filterAppendix(this.value)" style="width:300px"></div></div>';
    mn+='<table class="appendix-table" id="appTable"><thead><tr><th>问题</th><th>要点</th></tr></thead><tbody>';
    appendixData.forEach(([k,v])=>{mn+=`<tr><td>${k}</td><td>${v}</td></tr>`});
    mn+='</tbody></table>';
  }else{
    mn+=`<div class="content-header"><h1>${dim.dim}</h1><div class="subtitle">${dim.questions.length} 道面试题 — 点击卡片翻转查看答案</div></div>`;
    mn+='<div class="toolbar"><button class="tool-btn" onclick="randomQ()">🎲 随机抽题</button>';
    mn+=`<span class="timer-display" id="timerDisp">00:00</span>`;
    mn+=`<button class="timer-btn" id="timerBtn" onclick="toggleTimer()">⏱ 开始计时</button></div>`;
    mn+='<div class="card-grid">';
    dim.questions.forEach((q,qi)=>{
      const st=p[`i_${S.dim}_${qi}`];
      const sLabel=st==='p'?'已练习':st==='r'?'需复习':'';
      const sColor=st==='p'?'var(--success)':st==='r'?'var(--warn)':'transparent';
      mn+=`<div class="card" onclick="this.classList.toggle('flipped')" style="animation-delay:${qi*40}ms"><div class="card-inner">
        <div class="card-face card-front"><div class="card-idx">Q${qi+1}</div><div class="card-title">${q.q}</div>
        <div class="card-footer">${sLabel?`<span class="card-status" style="color:${sColor}">[${sLabel}]</span>`:''}<span class="card-tag">${dim.dim}</span></div></div>
        <div class="card-face card-back"><h4>参考答案</h4><p>${q.a}</p>
        ${q.code?`<h4>代码关联</h4><p class="code-link">${q.code}</p>`:''}
        ${q.follow?`<h4>追问方向</h4><p class="follow-q">${q.follow}</p>`:''}
        <div class="card-actions"><button class="card-action practice" onclick="event.stopPropagation();markI(${S.dim},${qi},'p')">✓ 已练习</button>
        <button class="card-action review" onclick="event.stopPropagation();markI(${S.dim},${qi},'r')">⚑ 需复习</button></div></div></div></div>`;
    });
    mn+='</div>';
  }
  mn+='</div>';
  app.innerHTML=sb+mn;
}

function markI(di,qi,st){const p=P();p[`i_${di}_${qi}`]=st;save(p);render()}
function randomQ(){const dim=interviewData[S.dim],p=P(),un=[];dim.questions.forEach((_,qi)=>{if(!p[`i_${S.dim}_${qi}`])un.push(qi)});if(!un.length){alert('该维度所有题目已练习完毕！');return}const idx=un[Math.floor(Math.random()*un.length)];const cards=document.querySelectorAll('.card');if(cards[idx]){cards[idx].scrollIntoView({behavior:'smooth',block:'center'});cards[idx].classList.add('flipped');cards[idx].style.outline='2px solid var(--accent)';cards[idx].style.outlineOffset='3px';setTimeout(()=>{cards[idx].style.outline='';cards[idx].style.outlineOffset=''},3000)}}
function toggleTimer(){if(S.running){clearInterval(S.timer);S.running=false;const b=document.getElementById('timerBtn');if(b){b.textContent='⏱ 开始计时';b.classList.remove('running')}}else{S.secs=0;S.running=true;const b=document.getElementById('timerBtn');if(b){b.textContent='⏹ 停止计时';b.classList.add('running')}S.timer=setInterval(()=>{S.secs++;const m=Math.floor(S.secs/60).toString().padStart(2,'0');const s=(S.secs%60).toString().padStart(2,'0');const d=document.getElementById('timerDisp');if(d)d.textContent=`${m}:${s}`},1000)}}
function filterAppendix(v){const rows=document.querySelectorAll('#appTable tbody tr');v=v.toLowerCase();rows.forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(v)?'':'none'})}

/* ═══════════ SCENARIO MODE ═══════════ */
function renderScenario(app){
  let sb='<div class="sidebar">';
  sb+=`<div class="dim-item active" onclick="S.sec=0;render()"><span>端到端流程</span><span class="dim-badge">${scenarioData.e2e.length}</span></div>`;
  sb+=`<div class="dim-item" onclick="S.sec=1;render()"><span>故障排查</span><span class="dim-badge">${scenarioData.fault.length}</span></div>`;
  sb+='</div>';

  let mn='<div class="main">';
  if(S.sec===0){
    mn+=`<div class="content-header"><h1>端到端场景还原</h1><div class="subtitle">追踪请求从入口到出口的完整链路</div></div>`;
    mn+='<div class="scenario-grid">';
    scenarioData.e2e.forEach((sc,si)=>{
      mn+=`<div class="scenario-card e2e" onclick="this.classList.toggle('open')" style="animation-delay:${si*60}ms">
        <h3><span class="sc-icon">→</span>${sc.title}</h3><p class="sc-desc">${sc.desc}</p><div class="sc-steps">`;
      sc.steps.forEach((st,sti)=>{
        mn+=`<div class="sc-step"><div class="sc-num">${sti+1}</div><div class="sc-step-content"><p><strong>${st.s}</strong></p><p class="sc-loc">${st.loc}</p>${st.detail?`<p style="font-size:12.5px;color:var(--fg3);margin-top:2px">${st.detail}</p>`:''}</div></div>`;
      });
      mn+='</div></div>';
    });
    mn+='</div>';
  }else{
    mn+=`<div class="content-header"><h1>故障排查场景</h1><div class="subtitle">当组件故障时系统如何响应</div></div>`;
    mn+='<div class="scenario-grid">';
    scenarioData.fault.forEach((sc,si)=>{
      mn+=`<div class="scenario-card fault" onclick="this.classList.toggle('open')" style="animation-delay:${si*60}ms">
        <h3><span class="sc-icon">⚠</span>${sc.title}</h3><p class="sc-desc">${sc.desc}</p><div class="sc-steps">`;
      sc.impacts.forEach(im=>{
        mn+=`<div class="fault-tree"><div class="ft-title">${im.what}</div><p>${im.detail}</p></div>`;
        mn+=`<div class="fix-box"><div class="fx-title">修复/降级</div><p>${im.fix}</p></div>`;
      });
      mn+='</div></div>';
    });
    mn+='</div>';
  }
  mn+='</div>';
  app.innerHTML=sb+mn;
}

/* ═══════════ SEARCH ═══════════ */
function renderSearch(app){
  const q=S.q,res=[];
  learnData.forEach((ch,ci)=>{
    ch.topics.forEach((t,ti)=>{
      const txt=t.q+t.lv1+t.lv2+t.lv3;
      if(txt.toLowerCase().includes(q))
        res.push({m:'learn',ci,ti,title:`${ch.title} > ${t.q}`,snip:strip(t.lv1).substring(0,120)});
    });
    ch.quiz.forEach((quiz,qi)=>{
      if(quiz.q.toLowerCase().includes(q)||quiz.hint.toLowerCase().includes(q))
        res.push({m:'learn',ci,ti:-1,title:`${ch.title} > 自检题 Q${qi+1}`,snip:quiz.q});
    });
  });
  interviewData.forEach((dim,di)=>{
    dim.questions.forEach((qu,qi)=>{
      if(qu.q.toLowerCase().includes(q)||qu.a.toLowerCase().includes(q))
        res.push({m:'interview',di,title:`${dim.dim} > Q${qi+1}`,snip:qu.q});
    });
  });
  scenarioData.e2e.forEach(sc=>{
    if(sc.title.toLowerCase().includes(q)||sc.desc.toLowerCase().includes(q))
      res.push({m:'scenario',sec:0,title:`端到端 > ${sc.title}`,snip:sc.desc});
  });
  scenarioData.fault.forEach(sc=>{
    if(sc.title.toLowerCase().includes(q)||sc.desc.toLowerCase().includes(q))
      res.push({m:'scenario',sec:1,title:`故障排查 > ${sc.title}`,snip:sc.desc});
  });
  appendixData.forEach(([k,v])=>{
    if(k.toLowerCase().includes(q)||v.toLowerCase().includes(q))
      res.push({m:'interview',di:interviewData.length-1,title:`追问速查表 > ${k}`,snip:v});
  });

  let h='<div class="sidebar"><div class="sidebar-empty">搜索模式<br><small>侧边栏已隐藏</small></div></div>';
  h+='<div class="main search-results">';
  h+=`<div class="content-header"><h1>搜索结果</h1><div class="subtitle">"${S.q}" — 找到 ${res.length} 条匹配</div></div>`;
  if(!res.length)h+='<p style="color:var(--fg3);text-align:center;padding:40px;">未找到匹配内容，换个关键词试试？</p>';
  res.forEach(r=>{
    h+=`<div class="search-result" onclick='jump(${JSON.stringify(r).replace(/'/g,"\\'")})'>
      <div class="sr-mode">${r.m==='learn'?'知识学习':r.m==='interview'?'面试模拟':'场景还原'}</div>
      <div class="sr-title">${hl(r.title,S.q)}</div>
      <div class="sr-snippet">${hl(r.snip,S.q)}</div></div>`;
  });
  h+='</div>';
  app.innerHTML=h;
}

function jump(r){
  S.q='';document.getElementById('searchInput').value='';
  if(r.m==='learn'){S.mode='learn';S.ch=r.ci;S.topic=Math.max(0,r.ti);S.sec=r.ti>=0?0:-1}
  else if(r.m==='interview'){S.mode='interview';S.dim=r.di}
  else{S.mode='scenario';S.sec=r.sec}
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===S.mode));
  render();
}

/* ═══════════ INIT ═══════════ */
setT(getT());
render();
</script>
</body>
</html>
